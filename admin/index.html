<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | るーとの研究室</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#020b18" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap" />
  <link rel="stylesheet" href="/assets/css/variables.css" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 40px 32px;
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-teal));
      border-radius: var(--r-xl) var(--r-xl) 0 0;
    }

    .login-icon {
      width: 56px;
      height: 56px;
      border-radius: var(--r-md);
      border: 1px solid var(--border-m);
      background: rgba(75,169,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      color: var(--accent-blue);
    }

    .login-icon svg { width: 28px; height: 28px; }

    .login-title {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-align: center;
      color: var(--text-0);
      margin-bottom: 6px;
    }

    .login-sub {
      font-family: var(--font-mono);
      font-size: var(--fs-2xs);
      color: var(--text-2);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 32px;
    }

    .login-row { margin-bottom: 20px; }

    .login-label {
      display: block;
      font-family: var(--font-mono);
      font-size: var(--fs-2xs);
      color: var(--accent-teal);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .login-input {
      width: 100%;
      background: rgba(75,169,255,0.02);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 13px 16px;
      color: var(--text-0);
      font-size: var(--fs-base);
      outline: none;
      transition: border-color var(--t), box-shadow var(--t);
      min-height: 48px;
    }

    .login-input:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(75,169,255,0.12);
    }

    .login-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(120deg, var(--accent-blue), var(--accent-teal));
      color: var(--bg-0);
      border: none;
      border-radius: var(--r-md);
      font-family: var(--font-mono);
      font-size: var(--fs-xs);
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      min-height: 50px;
      transition: transform var(--t) var(--ease-spring), box-shadow var(--t);
      margin-top: 8px;
    }

    .login-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(75,169,255,0.28);
    }

    .login-error {
      margin-top: 16px;
      padding: 12px 14px;
      background: rgba(248,113,113,0.06);
      border: 1px solid rgba(248,113,113,0.25);
      border-radius: var(--r-sm);
      color: #f87171;
      font-family: var(--font-mono);
      font-size: var(--fs-2xs);
      display: none;
    }

    .login-error.visible { display: block; }

    .login-back {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-family: var(--font-mono);
      font-size: var(--fs-2xs);
      color: var(--text-2);
      letter-spacing: 0.1em;
      text-decoration: none;
      transition: color var(--t);
    }

    .login-back:hover { color: var(--accent-blue); }

    @media (max-width: 420px) {
      .login-card { padding: 28px 22px; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h1 class="login-title">Admin Login</h1>
    <p class="login-sub">Research Lab Control Panel</p>

    <form id="login-form" novalidate>
      <div class="login-row">
        <label class="login-label" for="admin-password">Password</label>
        <input type="password" id="admin-password" class="login-input" autocomplete="current-password" required />
      </div>
      <button type="submit" class="login-submit">ログイン</button>
      <div class="login-error" id="login-error" role="alert">パスワードが正しくありません。</div>
    </form>

    <a href="/" class="login-back">← Back to Lab</a>
  </div>

  <script src="/admin/js/admin-auth.js"></script>
  <script>
  (function () {
    "use strict";
    var form = document.getElementById("login-form");
    var pwd  = document.getElementById("admin-password");
    var err  = document.getElementById("login-error");

    if (AdminAuth.isAuthenticated()) {
      window.location.href = "/admin/dashboard.html";
      return;
    }

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      if (AdminAuth.login(pwd.value)) {
        window.location.href = "/admin/dashboard.html";
      } else {
        err.classList.add("visible");
        pwd.value = "";
        pwd.focus();
      }
    });
  })();
  </script>
</body>
</html>
