<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>早押しトレーナー AI</title>
<script src="https://js.puter.com/v2/"></script>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3e;
    --accent: #00e5ff;
    --accent2: #ff3d6b;
    --accent3: #ffe600;
    --text: #e8e8f0;
    --text-muted: #6b6b8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    position: relative;
    z-index: 1;
  }

  header { text-align: center; margin-bottom: 48px; }

  .logo-tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 12px;
    margin-bottom: 20px;
    text-transform: uppercase;
    animation: fadeIn 0.6s ease;
  }

  h1 {
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
    animation: slideUp 0.6s ease 0.1s both;
  }

  h1 span {
    color: var(--accent);
    position: relative;
  }

  h1 span::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    opacity: 0.35;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 14px;
    letter-spacing: 0.05em;
    animation: slideUp 0.6s ease 0.2s both;
  }

  .free-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,229,255,0.08);
    border: 1px solid rgba(0,229,255,0.3);
    padding: 6px 14px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    margin-top: 16px;
    animation: slideUp 0.6s ease 0.25s both;
  }

  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px;
    margin-bottom: 24px;
    animation: slideUp 0.6s ease 0.3s both;
  }

  .card-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 16px;
    line-height: 1.8;
    padding: 16px;
    resize: vertical;
    min-height: 120px;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text-muted); }

  .answer-row {
    display: flex;
    gap: 12px;
    margin-top: 14px;
    align-items: center;
  }

  .answer-label {
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
    font-family: 'JetBrains Mono', monospace;
  }

  .answer-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .answer-input:focus { border-color: var(--accent2); }

  .btn-analyze {
    width: 100%;
    margin-top: 20px;
    padding: 16px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-analyze:hover:not(:disabled) {
    background: #33ecff;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,229,255,0.3);
  }

  .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: var(--bg);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .btn-analyze.loading .btn-text { display: none; }
  .btn-analyze.loading .spinner { display: block; }

  .result-section { display: none; }
  .result-section.visible { display: block; animation: slideUp 0.5s ease; }

  .viz-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px;
    margin-bottom: 20px;
  }

  .question-display {
    font-size: 18px;
    line-height: 2.6;
    letter-spacing: 0.02em;
  }

  .chunk {
    display: inline;
    position: relative;
    cursor: default;
    border-radius: 2px;
    padding: 2px 1px;
    transition: filter 0.15s;
  }

  .chunk[data-score="5"] {
    background: rgba(0,229,255,0.28);
    color: #00e5ff;
    font-weight: 700;
    box-shadow: 0 0 14px rgba(0,229,255,0.2);
  }
  .chunk[data-score="4"] {
    background: rgba(0,229,255,0.14);
    color: #80f2ff;
    font-weight: 700;
  }
  .chunk[data-score="3"] {
    background: rgba(255,230,0,0.14);
    color: #ffe600;
  }
  .chunk[data-score="2"] {
    background: rgba(255,61,107,0.1);
    color: #ff8aa0;
  }
  .chunk[data-score="1"] { color: var(--text-muted); }

  .chunk:hover .tooltip {
    opacity: 1;
    transform: translateX(-50%) translateY(-4px);
    pointer-events: auto;
  }

  .tooltip {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%) translateY(0);
    background: var(--surface2);
    border: 1px solid rgba(0,229,255,0.3);
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text);
    opacity: 0;
    transition: all 0.2s;
    pointer-events: none;
    z-index: 10;
    line-height: 1.6;
    max-width: 200px;
    white-space: normal;
    text-align: center;
    font-weight: 400;
    min-width: 80px;
  }

  .tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: rgba(0,229,255,0.3);
  }

  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  .best-point-card {
    background: var(--surface);
    border: 1px solid var(--accent);
    padding: 24px 28px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .best-point-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .best-point-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .best-point-text {
    font-size: 20px;
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 8px;
    line-height: 1.5;
  }

  .best-point-reason {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
  }

  .strategy-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  @media (max-width: 600px) { .strategy-grid { grid-template-columns: 1fr; } }

  .strategy-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
  }

  .strategy-card-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .strategy-card-body { font-size: 14px; line-height: 1.8; color: var(--text); }

  .difficulty-row {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    align-items: center;
    flex-wrap: wrap;
  }

  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 4px 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .badge-easy { background: rgba(0,229,255,0.15); color: var(--accent); border: 1px solid var(--accent); }
  .badge-mid  { background: rgba(255,230,0,0.15);  color: var(--accent3); border: 1px solid var(--accent3); }
  .badge-hard { background: rgba(255,61,107,0.15); color: var(--accent2); border: 1px solid var(--accent2); }

  .difficulty-label { font-size: 13px; color: var(--text-muted); }

  .error-box {
    background: rgba(255,61,107,0.1);
    border: 1px solid var(--accent2);
    padding: 16px 20px;
    font-size: 14px;
    color: var(--accent2);
    margin-bottom: 20px;
    display: none;
    white-space: pre-line;
    line-height: 1.7;
  }

  .error-box.visible { display: block; }

  .hint-text {
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
  }

  .progress-wrap {
    margin-top: 16px;
    display: none;
  }
  .progress-wrap.visible { display: block; }
  .progress-header {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .progress-header span { color: var(--accent); }
  .progress-bar-bg {
    width: 100%;
    height: 3px;
    background: var(--border);
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.4s ease;
    box-shadow: 0 0 8px rgba(0,229,255,0.5);
  }
  .progress-step {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    min-height: 18px;
  }
  .limit-note {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    opacity: 0.7;
  }

  .progress-wrap {
    margin-top: 16px;
    display: none;
  }
  .progress-wrap.visible { display: block; }
  .progress-header {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .progress-pct { color: var(--accent); }
  .progress-bar-bg {
    width: 100%;
    height: 3px;
    background: var(--border);
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.5s ease;
    box-shadow: 0 0 8px rgba(0,229,255,0.5);
  }
  .progress-step {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    min-height: 18px;
    transition: opacity 0.3s;
  }
  .limit-note {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.7;
  }
  .progress-wrap { margin-top: 16px; display: none; }
  .progress-wrap.visible { display: block; }
  .progress-header { display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  .progress-pct { color: var(--accent) !important; }
  .progress-bar-bg { width: 100%; height: 3px; background: var(--border); overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.5s ease; box-shadow: 0 0 8px rgba(0,229,255,0.5); }
  .progress-step { font-size: 12px; color: var(--text-muted); margin-top: 8px; font-family: 'JetBrains Mono', monospace; min-height: 18px; }
  .limit-note { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 8px; font-family: 'JetBrains Mono', monospace; line-height: 1.8; }
  .push-marker {
    display: inline-block;
    vertical-align: middle;
    margin: 0 4px;
    padding: 2px 8px;
    background: var(--accent);
    color: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    border-radius: 2px;
    animation: markerPop 0.4s ease;
    white-space: nowrap;
  }
  @keyframes markerPop {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<div class="container">

  <header>
    <div class="logo-tag">AI Quiz Trainer v3.0</div>
    <h1>早押し<span>最適化</span>トレーナー</h1>
    <p class="subtitle">問題文を解析し、最適な押しポイントをAIが可視化する</p>
    <div class="free-badge">✓ APIキー不要 &nbsp;|&nbsp; 完全無料 &nbsp;|&nbsp; Claude Sonnet 4.5搭載</div>
  </header>

  <div class="input-card">
    <div class="card-label">問題文を入力</div>
    <textarea id="questionText" placeholder="例：「走れメロス」の中で、メロスが人質として王のもとに残した人物の名前は何でしょう？"></textarea>
    <div class="answer-row">
      <span class="answer-label">答え ▶</span>
      <input type="text" class="answer-input" id="answerText" placeholder="セリヌンティウス">
    </div>
    <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">
      <span class="btn-text">⚡ 早押しポイントを解析する</span>
      <div class="spinner"></div>
    </button>
    <p class="hint-text">Ctrl + Enter でも解析できます</p>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-header">
        <span id="progressStep">待機中...</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
    </div>
  </div>
  <p class="limit-note" id="limitNote" style="display:none">
    ⚠️ Puter.jsの無料枠は1日あたり数十〜数百回程度（非公式）。<br>
    制限に達した場合はしばらく時間をおいて再試行してください。
  </p>

  <div class="error-box" id="errorBox"></div>

  <div class="result-section" id="resultSection">
    <div class="difficulty-row" id="difficultyRow"></div>

    <div class="best-point-card">
      <div class="best-point-title">⚡ 最適な押しポイント</div>
      <div class="best-point-text" id="bestPointText"></div>
      <div class="best-point-reason" id="bestPointReason"></div>
    </div>

    <div class="viz-card">
      <div class="card-label">問題文ヒートマップ（ホバーでヒント表示）</div>
      <div class="question-display" id="questionDisplay"></div>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:rgba(0,229,255,0.5)"></div>
          <span>今すぐ押せる</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:rgba(0,229,255,0.25)"></div>
          <span>ほぼ確定</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:rgba(255,230,0,0.25)"></div>
          <span>やや絞れる</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:rgba(255,61,107,0.15)"></div>
          <span>まだ早い</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#1a1a26"></div>
          <span>情報なし</span>
        </div>
      </div>
    </div>

    <div class="strategy-grid" id="strategyGrid"></div>
  </div>

</div>

<script>
async function analyze() {
  const question = document.getElementById('questionText').value.trim();
  const answer   = document.getElementById('answerText').value.trim();
  const btn      = document.getElementById('analyzeBtn');
  const errorBox = document.getElementById('errorBox');

  errorBox.classList.remove('visible');
  if (!question) { showError('問題文を入力してください。'); return; }

  btn.classList.add('loading');
  btn.disabled = true;
  document.getElementById('resultSection').classList.remove('visible');
  document.getElementById('limitNote').style.display = 'none';

  // プログレスバー開始
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressStep = document.getElementById('progressStep');
  const progressPct  = document.getElementById('progressPct');
  progressWrap.classList.add('visible');

  const steps = [
    { pct: 10, label: '問題文を解析中...' },
    { pct: 30, label: '確定ポイントを特定中...' },
    { pct: 55, label: 'ヒートマップを生成中...' },
    { pct: 75, label: '早押し戦略を構築中...' },
    { pct: 90, label: '結果を整形中...' },
  ];
  let stepIdx = 0;
  const progressTimer = setInterval(() => {
    if (stepIdx < steps.length) {
      const s = steps[stepIdx++];
      progressFill.style.width = s.pct + '%';
      progressStep.textContent = s.label;
      progressPct.textContent = s.pct + '%';
    }
  }, 900);

  const prompt = `あなたは競技クイズ（早押しクイズ）の超一流プレイヤーかつ解析の専門家です。

問題文: 「${question}」
答え（分析用・問題文には絶対に含めないこと）: 「${answer || '不明'}」

【絶対禁止】
- chunksの中に答えの文字列を含めてはいけない
- 問題文にない文字をchunksに追加してはいけない
- chunksを全て結合すると問題文と完全に一致しなければならない

【スコアの付け方：積極的に早めに高スコアをつける】
競技クイズの上級プレイヤーは「確信がなくても早めに押す」。
そのため、スコアは実際に確信が持てるより1段階早く（積極的に）付ける。
scoreは絶対に下がらない。一度上がったら以降は同じかそれ以上。

score基準（積極的判定）:
- 1: 答えと完全に無関係
- 2: 答えが連想できる程度（同ジャンルのキーワード出現）
- 3: 答えの候補が数個以内に絞れる（ここで勇気ある押しを狙う）
- 4: 答えがほぼ一択（確信80%以上）
- 5: 答えが完全に一意確定・これ以降ずっと5

【重要：スコアを早めにつける具体的ルール】
- 答えと同じカテゴリの固有名詞・専門用語が出たらscore=3（まだ候補が複数でも）
- 答えに直結する修飾語・限定語が出たらscore=4（「唯一の」「特に」「のみ」など）
- 答えを一意に特定できる情報が出たらscore=5（以降は全て5）
- 「何でしょう？」などの末尾疑問文もscore=5（確定後なので）

【1文字単位での分割ルール】
- 1文字〜3文字の細かい単位で分割する
- 句読点「、」「。」「？」「『』」も独立したchunkにする
- 1つのchunkに4文字以上入れない

【確定ポイントの例】
- 「宮沢賢治が」→ score=3（宮沢賢治の作品が候補に絞られる）
- 「生前刊行した」→ score=4（詩集に絞られてきた）
- 「唯一の詩集」→ score=5（春と修羅しかない）
- 「テイラー展開の中でも特に、」→ score=4（マクローリン展開が濃厚）
- 「x=0の周り」→ score=5（完全確定）

次のJSON形式だけで回答してください。説明文は一切不要です:

{
  "difficulty": "easy",
  "difficulty_reason": "難易度の理由（30文字以内）",
  "best_push_phrase": "score=5が最初に登場するchunkのtext",
  "best_push_reason": "なぜそこが確定ポイントか（120文字以内）",
  "chunks": [
    { "text": "1〜3文字", "score": 1, "tip": "score3以上のみ・20文字以内、それ以外は空文字" }
  ],
  "early_strategy": "この問題で早押しに勝つ具体的な戦略（120文字以内）",
  "trap_warning": "混同しやすい答え・カブりのリスク（100文字以内）"
}

difficultyは"easy"（有名・教養）"mid"（専門知識必要）"hard"（高難度・マニアック）のいずれか。`;

  try {
    const response = await puter.ai.chat(prompt, { model: 'claude-sonnet-4-5' });

    // あらゆるputer.jsレスポンス形式に対応して文字列を取り出す
    function extractText(r) {
      if (typeof r === 'string') return r;
      // 再帰的にすべてのフィールドからtextを探す
      const candidates = [
        r?.text,
        r?.message?.content,
        r?.message?.content?.[0]?.text,
        r?.choices?.[0]?.message?.content,
        r?.content?.[0]?.text,
        r?.content,
      ];
      for (const c of candidates) {
        if (typeof c === 'string' && c.length > 0) return c;
        if (Array.isArray(c)) {
          const joined = c.map(b => b?.text || b?.content || '').join('');
          if (joined.length > 0) return joined;
        }
      }
      // 最終手段：JSON全体から最初の{...}を探す
      return JSON.stringify(r);
    }
    const rawText = extractText(response);

    const jsonMatch = rawText.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('AIの応答を解析できませんでした。再度お試しください。');

    const result = JSON.parse(jsonMatch[0]);

    // フェイルセーフ1: chunksを結合した文字列が問題文と一致するか検証・修復
    if (result.chunks) {
      const joined = result.chunks.map(c => c.text).join('');
      if (joined !== question) {
        // 問題文と一致しない場合、問題文を1文字ずつ分割してscoreを再マッピング
        console.warn('chunks mismatch, rebuilding from question text');
        const scoreMap = {};
        let pos = 0;
        for (const chunk of result.chunks) {
          const idx = question.indexOf(chunk.text, pos);
          if (idx !== -1) {
            for (let i = idx; i < idx + chunk.text.length; i++) {
              scoreMap[i] = Math.max(scoreMap[i] || 1, chunk.score);
            }
            pos = idx + chunk.text.length;
          }
        }
        result.chunks = question.split('').map((char, i) => ({
          text: char,
          score: scoreMap[i] || 1,
          tip: ''
        }));
      }

      // フェイルセーフ2: scoreが単調増加になるよう強制補正
      let maxScore = 1;
      result.chunks = result.chunks.map(chunk => {
        if (chunk.score > maxScore) maxScore = chunk.score;
        return { ...chunk, score: maxScore };
      });

      // 1段階前倒し：score 2→3, 3→4, 4→5（score1と5はそのまま）
      result.chunks = result.chunks.map(chunk => {
        if (chunk.score >= 2 && chunk.score < 5) {
          return { ...chunk, score: Math.min(chunk.score + 1, 5) };
        }
        return chunk;
      });

      // 「今すぐに」ルール：score=4のchunkが出た瞬間に5に昇格（単調増加と組み合わせ）
      // → つまりAIがscore=3をつけた箇所が前倒し後score=4になり、その時点で押せる
      // best_push_phraseをscore=5が最初に出るchunkに強制同期
      const firstScore5 = result.chunks.find(c => c.score === 5);
      if (firstScore5) {
        result.best_push_phrase = firstScore5.text;
      }
    }

    clearInterval(progressTimer);
    progressFill.style.width = '100%';
    progressStep.textContent = '解析完了！';
    progressPct.textContent = '100%';
    setTimeout(() => progressWrap.classList.remove('visible'), 800);
    renderResult(result);

  } catch (e) {
    // Puter.jsのログインが必要な場合の案内も含む
    const msg = e.message || String(e);
    if (msg.includes('login') || msg.includes('auth') || msg.includes('sign')) {
      showError('初回利用時はPuter.jsのログインが必要です。\nポップアップが表示されたらGoogleアカウントでサインインしてください。\nその後もう一度解析ボタンを押してください。');
    } else {
      showError('エラー: ' + msg);
    }
  } finally {
    clearInterval(progressTimer);
    progressWrap.classList.remove('visible');
    progressFill.style.width = '0%';
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function renderResult(result) {
  const diffMap = {
    easy: ['badge-easy', '初級'],
    mid:  ['badge-mid',  '中級'],
    hard: ['badge-hard', '上級']
  };
  const [cls, label] = diffMap[result.difficulty] || ['badge-mid', '中級'];
  document.getElementById('difficultyRow').innerHTML =
    `<span class="badge ${cls}">${label}</span><span class="difficulty-label">${result.difficulty_reason || ''}</span>`;

  document.getElementById('bestPointText').textContent = `「${result.best_push_phrase}」で押す`;
  document.getElementById('bestPointReason').textContent = result.best_push_reason || '';

  const display = document.getElementById('questionDisplay');
  display.innerHTML = '';
  let markerInserted = false;
  (result.chunks || []).forEach(chunk => {
    const span = document.createElement('span');
    span.className = 'chunk';
    span.setAttribute('data-score', chunk.score || 1);
    span.textContent = chunk.text;
    if (chunk.tip && chunk.score >= 3) {
      const tip = document.createElement('div');
      tip.className = 'tooltip';
      tip.textContent = chunk.tip;
      span.appendChild(tip);
    }
    display.appendChild(span);

    // score=5が初めて出た直後にマーカーを挿入
    if (!markerInserted && chunk.score === 5) {
      const marker = document.createElement('span');
      marker.className = 'push-marker';
      marker.textContent = '⚡ ここで押す';
      display.appendChild(marker);
      markerInserted = true;
    }
  });

  document.getElementById('strategyGrid').innerHTML = `
    <div class="strategy-card">
      <div class="strategy-card-title">⚡ 早押し戦略</div>
      <div class="strategy-card-body">${result.early_strategy || '-'}</div>
    </div>
    <div class="strategy-card">
      <div class="strategy-card-title">⚠️ 罠・注意ポイント</div>
      <div class="strategy-card-body">${result.trap_warning || '-'}</div>
    </div>
  `;

  document.getElementById('resultSection').classList.add('visible');
  setTimeout(() => {
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.add('visible');
  // 制限エラーの場合は回数制限の注意を表示
  if (msg.includes('quota') || msg.includes('rate') || msg.includes('limit') || msg.includes('429')) {
    document.getElementById('limitNote').style.display = 'block';
  }
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') analyze();
});
