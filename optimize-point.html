<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>早押しトレーナー AI</title>
<script src="https://js.puter.com/v2/"></script>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3e;
    --accent: #00e5ff;
    --accent2: #ff3d6b;
    --accent3: #ffe600;
    --text: #e8e8f0;
    --text-muted: #6b6b8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    position: relative;
    z-index: 1;
  }

  header { text-align: center; margin-bottom: 48px; }

  .logo-tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 12px;
    margin-bottom: 20px;
    text-transform: uppercase;
    animation: fadeIn 0.6s ease;
  }

  h1 {
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
    animation: slideUp 0.6s ease 0.1s both;
  }

  h1 span {
    color: var(--accent);
    position: relative;
  }

  h1 span::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    opacity: 0.35;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 14px;
    letter-spacing: 0.05em;
    animation: slideUp 0.6s ease 0.2s both;
  }

  .free-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,229,255,0.08);
    border: 1px solid rgba(0,229,255,0.3);
    padding: 6px 14px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    margin-top: 16px;
    animation: slideUp 0.6s ease 0.25s both;
  }

  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px;
    margin-bottom: 24px;
    animation: slideUp 0.6s ease 0.3s both;
  }

  .card-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 16px;
    line-height: 1.8;
    padding: 16px;
    resize: vertical;
    min-height: 120px;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text-muted); }

  .answer-row {
    display: flex;
    gap: 12px;
    margin-top: 14px;
    align-items: center;
  }

  .answer-label {
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
    font-family: 'JetBrains Mono', monospace;
  }

  .answer-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .answer-input:focus { border-color: var(--accent2); }

  .btn-analyze {
    width: 100%;
    margin-top: 20px;
    padding: 16px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-analyze:hover:not(:disabled) {
    background: #33ecff;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,229,255,0.3);
  }

  .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: var(--bg);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .btn-analyze.loading .btn-text { display: none; }
  .btn-analyze.loading .spinner { display: block; }

  .result-section { display: none; }
  .result-section.visible { display: block; animation: slideUp 0.5s ease; }

  .viz-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px;
    margin-bottom: 20px;
  }

  .question-display {
    font-size: 18px;
    line-height: 2.6;
    letter-spacing: 0.02em;
  }

  .chunk {
    display: inline;
    position: relative;
    cursor: default;
    border-radius: 2px;
    padding: 2px 1px;
    transition: filter 0.15s;
  }

  .chunk[data-score="5"] {
    background: rgba(0,229,255,0.28);
    color: #00e5ff;
    font-weight: 700;
    box-shadow: 0 0 14px rgba(0,229,255,0.2);
  }
  .chunk[data-score="4"] {
    background: rgba(0,229,255,0.14);
    color: #80f2ff;
    font-weight: 700;
  }
  .chunk[data-score="3"] {
    background: rgba(255,230,0,0.14);
    color: #ffe600;
  }
  .chunk[data-score="2"] {
    background: rgba(255,61,107,0.1);
    color: #ff8aa0;
  }
  .chunk[data-score="1"] { color: var(--text-muted); }

  .chunk:hover .tooltip {
    opacity: 1;
    transform: translateX(-50%) translateY(-4px);
    pointer-events: auto;
  }

  .tooltip {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%) translateY(0);
    background: var(--surface2);
    border: 1px solid rgba(0,229,255,0.3);
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text);
    opacity: 0;
    transition: all 0.2s;
    pointer-events: none;
    z-index: 10;
    line-height: 1.6;
    max-width: 200px;
    white-space: normal;
    text-align: center;
    font-weight: 400;
    min-width: 80px;
  }

  .tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: rgba(0,229,255,0.3);
  }

  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  .best-point-card {
    background: var(--surface);
    border: 1px solid var(--accent);
    padding: 24px 28px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .best-point-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .best-point-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .best-point-text {
    font-size: 20px;
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 8px;
    line-height: 1.5;
  }

  .best-point-reason {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
  }

  .strategy-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  @media (max-width: 600px) { .strategy-grid { grid-template-columns: 1fr; } }

  .strategy-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
  }

  .strategy-card-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .strategy-card-body { font-size: 14px; line-height: 1.8; color: var(--text); }

  .difficulty-row {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    align-items: center;
    flex-wrap: wrap;
  }

  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 4px 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .badge-easy { background: rgba(0,229,255,0.15); color: var(--accent); border: 1px solid var(--accent); }
  .badge-mid  { background: rgba(255,230,0,0.15);  color: var(--accent3); border: 1px solid var(--accent3); }
  .badge-hard { background: rgba(255,61,107,0.15); color: var(--accent2); border: 1px solid var(--accent2); }

  .difficulty-label { font-size: 13px; color: var(--text-muted); }

  .error-box {
    background: rgba(255,61,107,0.1);
    border: 1px solid var(--accent2);
    padding: 16px 20px;
    font-size: 14px;
    color: var(--accent2);
    margin-bottom: 20px;
    display: none;
    white-space: pre-line;
    line-height: 1.7;
  }

  .error-box.visible { display: block; }

  .hint-text {
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<div class="container">

  <header>
    <div class="logo-tag">AI Quiz Trainer v2.1</div>
    <h1>早押し<span>最適化</span>トレーナー</h1>
    <p class="subtitle">問題文を解析し、最適な押しポイントをAIが可視化する</p>
    <div class="free-badge">✓ APIキー不要 &nbsp;|&nbsp; 完全無料 &nbsp;|&nbsp; ブラウザで動く</div>
  </header>

  <div class="input-card">
    <div class="card-label">問題文を入力</div>
    <textarea id="questionText" placeholder="例：「走れメロス」の中で、メロスが人質として王のもとに残した人物の名前は何でしょう？"></textarea>
    <div class="answer-row">
      <span class="answer-label">答え ▶</span>
      <input type="text" class="answer-input" id="answerText" placeholder="セリヌンティウス">
    </div>
    <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">
      <span class="btn-text">⚡ 早押しポイントを解析する</span>
      <div class="spinner"></div>
    </button>
    <p class="hint-text">Ctrl + Enter でも解析できます</p>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="result-section" id="resultSection">
    <div class="difficulty-row" id="difficultyRow"></div>

    <div class="best-point-card">
      <div class="best-point-title">⚡ 最適な押しポイント</div>
      <div class="best-point-text" id="bestPointText"></div>
      <div class="best-point-reason" id="bestPointReason"></div>
    </div>

    <div class="viz-card">
      <div class="card-label">問題文ヒートマップ（ホバーでヒント表示）</div>
      <div class="question-display" id="questionDisplay"></div>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:rgba(0,229,255,0.5)"></div>
          <span>今すぐ押せる</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:rgba(0,229,255,0.25)"></div>
          <span>ほぼ確定</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:rgba(255,230,0,0.25)"></div>
          <span>やや絞れる</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:rgba(255,61,107,0.15)"></div>
          <span>まだ早い</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#1a1a26"></div>
          <span>情報なし</span>
        </div>
      </div>
    </div>

    <div class="strategy-grid" id="strategyGrid"></div>
  </div>

</div>

<script>
async function analyze() {
  const question = document.getElementById('questionText').value.trim();
  const answer   = document.getElementById('answerText').value.trim();
  const btn      = document.getElementById('analyzeBtn');
  const errorBox = document.getElementById('errorBox');

  errorBox.classList.remove('visible');
  if (!question) { showError('問題文を入力してください。'); return; }

  btn.classList.add('loading');
  btn.disabled = true;
  document.getElementById('resultSection').classList.remove('visible');

  const prompt = `あなたは競技クイズ（早押しクイズ）の超一流プレイヤーかつ解析の専門家です。

答え: 「${answer || '不明'}」
問題文: 「${question}」

【STEP1: 確定ポイント特定】
問題文を先頭から1語ずつ読み進め、以下を判定してください：
- 答え以外が完全に消える最初の瞬間 → score=5（確定ポイント）
- 答えが強く示唆され始める瞬間 → score=4
- 答えの候補に入ってくる瞬間 → score=3
- まだ候補にすら入らない情報 → score=2
- 答えと無関係（「というでしょう？」等） → score=1

【STEP2: 絶対に守るルール】
1. score=5は「この語を聞いた時点で答えが他にあり得ない」場合のみ
2. score=5は問題文の中でできるだけ早い位置に設定（後半に置くのは原則NG）
3. 答えを強く示唆するキーワードが前半にあるなら、そこをscore=4以上にする
4. 問題文末尾の「〜は何でしょう？」「〜といえば？」はscore=1
5. best_push_phraseはscore=5のchunkのtextと一致させる

【競技クイズ知識】
- 確定ポイント: 答えが一意に定まる最初の瞬間
- カブり: 複数の答えが候補になる状態
- フェイント: 別の答えを連想させる罠表現
- 引っ張り: 末尾まで読まないと確定しない構造
- 例）「テイラー展開の中でも特に、」→ マクローリン展開が強示唆でscore=4、「x=0」でscore=5

次のJSON形式だけで回答してください。\`\`\`や説明文は一切不要です:

{
  "difficulty": "easy",
  "difficulty_reason": "難易度の理由（30文字以内）",
  "best_push_phrase": "score=5のchunkのtextをそのまま入れる",
  "best_push_reason": "なぜそこが確定ポイントか（120文字以内）",
  "chunks": [
    { "text": "文節テキスト", "score": 3, "tip": "競技クイズ的ヒント（score3以上のみ・25文字以内）" }
  ],
  "early_strategy": "この問題で早押しに勝つ具体的な戦略（120文字以内）",
  "trap_warning": "混同しやすい答え・フェイント・カブりのリスク（100文字以内）"
}

difficultyは "easy"（有名・教養レベル）"mid"（専門知識必要）"hard"（高難度・マニアック）のいずれか。
chunksは問題文全体を自然な文節・単語で余すことなく分割してください。\`;

  try {
    const response = await puter.ai.chat(prompt, { model: 'gemini-2.0-flash' });
    const rawText = typeof response === 'string' ? response : (response?.message?.content || response?.text || JSON.stringify(response));

    const jsonMatch = rawText.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('AIの応答を解析できませんでした。再度お試しください。');

    const result = JSON.parse(jsonMatch[0]);
    renderResult(result);

  } catch (e) {
    // Puter.jsのログインが必要な場合の案内も含む
    const msg = e.message || String(e);
    if (msg.includes('login') || msg.includes('auth') || msg.includes('sign')) {
      showError('初回利用時はPuter.jsのログインが必要です。\nポップアップが表示されたらGoogleアカウントでサインインしてください。\nその後もう一度解析ボタンを押してください。');
    } else {
      showError('エラー: ' + msg);
    }
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function renderResult(result) {
  const diffMap = {
    easy: ['badge-easy', '初級'],
    mid:  ['badge-mid',  '中級'],
    hard: ['badge-hard', '上級']
  };
  const [cls, label] = diffMap[result.difficulty] || ['badge-mid', '中級'];
  document.getElementById('difficultyRow').innerHTML =
    `<span class="badge ${cls}">${label}</span><span class="difficulty-label">${result.difficulty_reason || ''}</span>`;

  document.getElementById('bestPointText').textContent = `「${result.best_push_phrase}」で押す`;
  document.getElementById('bestPointReason').textContent = result.best_push_reason || '';

  const display = document.getElementById('questionDisplay');
  display.innerHTML = '';
  (result.chunks || []).forEach(chunk => {
    const span = document.createElement('span');
    span.className = 'chunk';
    span.setAttribute('data-score', chunk.score || 1);
    span.textContent = chunk.text;
    if (chunk.tip && chunk.score >= 3) {
      const tip = document.createElement('div');
      tip.className = 'tooltip';
      tip.textContent = chunk.tip;
      span.appendChild(tip);
    }
    display.appendChild(span);
  });

  document.getElementById('strategyGrid').innerHTML = `
    <div class="strategy-card">
      <div class="strategy-card-title">⚡ 早押し戦略</div>
      <div class="strategy-card-body">${result.early_strategy || '-'}</div>
    </div>
    <div class="strategy-card">
      <div class="strategy-card-title">⚠️ 罠・注意ポイント</div>
      <div class="strategy-card-body">${result.trap_warning || '-'}</div>
    </div>
  `;

  document.getElementById('resultSection').classList.add('visible');
  setTimeout(() => {
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.add('visible');
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') analyze();
});
</script>
</body>
</html>
