<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>早押しトレーナー AI</title>
<script src="https://js.puter.com/v2/"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:     #09090f;
  --ink2:    #0f0f18;
  --ink3:    #161621;
  --ink4:    #1e1e2c;
  --gold:    #c9a84c;
  --gold2:   #e8c96a;
  --gold3:   #f5e0a0;
  --goldDim: rgba(201,168,76,0.15);
  --border:  rgba(201,168,76,0.12);
  --border2: rgba(201,168,76,0.22);
  --text:    #e8e4d8;
  --muted:   #5a5868;
  --muted2:  #8a8799;
  --s5: #c9a84c;
  --s4: #7ec8a0;
  --s3: #6a9fd8;
  --s2: #7060a0;
  --r: 4px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--ink);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* subtle top gradient */
body::before {
  content:'';
  position:fixed; top:0; left:0; right:0; height:300px;
  background: radial-gradient(ellipse 80% 100% at 50% -10%, rgba(201,168,76,0.06) 0%, transparent 100%);
  pointer-events:none; z-index:0;
}

.wrap {
  max-width: 700px;
  margin: 0 auto;
  padding: 60px 24px 120px;
  position: relative; z-index:1;
}

/* ════════════════════
   HEADER
════════════════════ */
header {
  text-align: center;
  margin-bottom: 56px;
  animation: fadeUp 0.6s ease both;
}

.crown {
  display: inline-block;
  font-size: 22px;
  margin-bottom: 16px;
  filter: grayscale(0.2);
}

.logo-line {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.35em;
  color: var(--gold);
  text-transform: uppercase;
  opacity: 0.7;
  margin-bottom: 16px;
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(34px, 7vw, 58px);
  font-weight: 600;
  letter-spacing: 0.02em;
  line-height: 1.1;
  margin-bottom: 14px;
  color: var(--text);
}

h1 em {
  font-style: italic;
  color: var(--gold2);
}

.tagline {
  font-size: 12px;
  color: var(--muted2);
  letter-spacing: 0.08em;
}

.badge-free {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-top: 18px;
  padding: 6px 16px;
  border: 1px solid var(--border);
  border-radius: 100px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--muted2);
  letter-spacing: 0.14em;
}

.badge-free::before, .badge-free::after {
  content:'';
  width:18px; height:1px;
  background: var(--border2);
}

/* ════════════════════
   DIVIDER
════════════════════ */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 36px 0 28px;
  opacity: 0.4;
}
.divider::before, .divider::after {
  content:''; flex:1; height:1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.divider span {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  color: var(--gold);
}

/* ════════════════════
   PANEL (card)
════════════════════ */
.panel {
  background: var(--ink2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 28px 28px 24px;
  margin-bottom: 14px;
  position: relative;
}

.panel::before {
  content:'';
  position:absolute; top:0; left:24px; right:24px; height:1px;
  background: linear-gradient(90deg, transparent, var(--border2), transparent);
}

.panel-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.28em;
  color: var(--gold);
  text-transform: uppercase;
  opacity: 0.6;
  margin-bottom: 14px;
}

/* ════════════════════
   INPUT
════════════════════ */
.input-panel { animation: fadeUp 0.6s 0.1s ease both; }

textarea, .answer-input {
  width: 100%;
  background: var(--ink);
  border: 1px solid rgba(201,168,76,0.1);
  border-radius: var(--r);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  line-height: 1.85;
  padding: 13px 16px;
  outline: none;
  transition: border-color 0.2s;
  resize: vertical;
}

textarea { min-height: 100px; }

textarea:focus, .answer-input:focus {
  border-color: rgba(201,168,76,0.35);
}

textarea::placeholder, .answer-input::placeholder { color: var(--muted); }

.answer-row {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-top: 12px;
}

.answer-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  white-space: nowrap;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.answer-input { flex:1; }

/* ── button ── */
.btn-analyze {
  width: 100%;
  margin-top: 16px;
  padding: 14px;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 50%, var(--gold) 100%);
  background-size: 200% 100%;
  color: var(--ink);
  border: none;
  border-radius: var(--r);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: background-position 0.4s, opacity 0.2s, transform 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
}

.btn-analyze:hover:not(:disabled) {
  background-position: 100% 0;
  transform: translateY(-1px);
}
.btn-analyze:active:not(:disabled) { transform: translateY(0); }
.btn-analyze:disabled { opacity: 0.35; cursor:not-allowed; }
.btn-analyze.loading .btn-text { display:none; }
.btn-analyze.loading .spinner { display:block; }

.spinner {
  width:16px; height:16px;
  border: 2px solid rgba(0,0,0,0.2);
  border-top-color: var(--ink);
  border-radius:50%;
  animation: spin 0.65s linear infinite;
  display:none;
}

.hint-text {
  text-align:center;
  font-family:'JetBrains Mono', monospace;
  font-size:9px;
  color:var(--muted);
  margin-top:8px;
  letter-spacing:0.1em;
}

/* progress */
.progress-wrap { display:none; margin-top:14px; }
.progress-wrap.visible { display:block; }

.progress-header {
  display:flex;
  justify-content:space-between;
  font-family:'JetBrains Mono', monospace;
  font-size:9px;
  color:var(--muted2);
  margin-bottom:6px;
  letter-spacing:0.08em;
}

.progress-pct { color:var(--gold); }

.progress-bar-bg {
  width:100%; height:1px;
  background:var(--border);
  overflow:hidden;
}

.progress-bar-fill {
  height:100%;
  background: linear-gradient(90deg, var(--gold2), var(--gold3));
  width:0%;
  transition:width 0.5s ease;
}

/* ════════════════════
   ERROR
════════════════════ */
.error-box {
  display:none;
  background: rgba(180,60,60,0.07);
  border:1px solid rgba(180,60,60,0.22);
  border-radius:var(--r);
  padding:13px 17px;
  font-size:12px;
  color:#d08888;
  white-space:pre-line;
  line-height:1.7;
  margin-bottom:14px;
}
.error-box.visible { display:block; }

.limit-note {
  display:none;
  text-align:center;
  font-size:10px;
  color:var(--muted);
  line-height:1.8;
  margin-bottom:14px;
  font-family:'JetBrains Mono', monospace;
}

/* ════════════════════
   RESULTS
════════════════════ */
.result-section { display:none; }
.result-section.visible { display:block; }

.difficulty-row {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:14px;
  animation: fadeUp 0.4s ease both;
}

.badge {
  font-family:'JetBrains Mono', monospace;
  font-size:8px;
  letter-spacing:0.18em;
  padding:3px 11px;
  border-radius:100px;
  text-transform:uppercase;
}
.badge-easy { background:rgba(201,168,76,0.1); color:var(--gold); border:1px solid var(--border2); }
.badge-mid  { background:rgba(106,159,216,0.1); color:#7ab0e0; border:1px solid rgba(106,159,216,0.25); }
.badge-hard { background:rgba(180,60,80,0.1);   color:#d07080; border:1px solid rgba(180,60,80,0.25); }

.difficulty-label { font-size:11px; color:var(--muted2); }

/* best point */
.best-panel {
  background: var(--ink2);
  border:1px solid var(--border2);
  border-radius:var(--r);
  padding:26px 28px;
  margin-bottom:14px;
  position:relative;
  overflow:hidden;
  animation: fadeUp 0.4s 0.05s ease both;
}

.best-panel::after {
  content:'';
  position:absolute; bottom:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,0.2), transparent);
}

.best-panel-label {
  font-family:'JetBrains Mono', monospace;
  font-size:8px;
  letter-spacing:0.28em;
  color:var(--gold);
  text-transform:uppercase;
  opacity:0.65;
  margin-bottom:10px;
}

.best-phrase {
  font-family:'Cormorant Garamond', serif;
  font-size:26px;
  font-weight:600;
  color:var(--gold2);
  margin-bottom:9px;
  line-height:1.35;
}

.best-reason {
  font-size:12px;
  color:var(--muted2);
  line-height:1.85;
}

/* heatmap */
.heatmap-panel {
  background: var(--ink2);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:26px 28px;
  margin-bottom:14px;
  animation: fadeUp 0.4s 0.1s ease both;
}

.question-display {
  font-size:17px;
  line-height:2.8;
  word-break:break-all;
  letter-spacing:0.01em;
}

.chunk {
  display:inline;
  position:relative;
  cursor:default;
  border-radius:2px;
  padding:1px 0;
}

.chunk[data-score="5"] { color:var(--s5); font-weight:700; }
.chunk[data-score="4"] { color:var(--s4); font-weight:500; }
.chunk[data-score="3"] { color:var(--s3); }
.chunk[data-score="2"] { color:var(--s2); }
.chunk[data-score="1"] { color:var(--muted); }

.chunk:hover .tooltip {
  opacity:1;
  transform:translateX(-50%) translateY(-4px);
  pointer-events:auto;
}

.tooltip {
  position:absolute;
  bottom:calc(100% + 8px);
  left:50%;
  transform:translateX(-50%) translateY(0);
  background:var(--ink4);
  border:1px solid var(--border2);
  border-radius:4px;
  padding:7px 11px;
  font-size:11px;
  color:var(--text);
  opacity:0;
  transition:all 0.15s;
  pointer-events:none;
  z-index:20;
  white-space:normal;
  text-align:center;
  min-width:80px;
  max-width:180px;
  line-height:1.6;
  font-weight:400;
  box-shadow:0 8px 28px rgba(0,0,0,0.6);
}

.tooltip::after {
  content:'';
  position:absolute; top:100%; left:50%;
  transform:translateX(-50%);
  border:4px solid transparent;
  border-top-color:var(--border2);
}

.legend {
  display:flex;
  flex-wrap:wrap;
  gap:10px 20px;
  margin-top:18px;
  padding-top:16px;
  border-top:1px solid var(--border);
}

.legend-item {
  display:flex;
  align-items:center;
  gap:6px;
  font-family:'JetBrains Mono', monospace;
  font-size:9px;
  color:var(--muted2);
  letter-spacing:0.08em;
}

.legend-dot {
  width:6px; height:6px;
  border-radius:50%;
  flex-shrink:0;
}

/* strategy */
.strategy-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  animation: fadeUp 0.4s 0.15s ease both;
}

@media (max-width:500px) { .strategy-grid { grid-template-columns:1fr; } }

.strategy-card {
  background:var(--ink2);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:18px 20px;
}

.strategy-card-title {
  font-family:'JetBrains Mono', monospace;
  font-size:8px;
  letter-spacing:0.22em;
  color:var(--muted);
  text-transform:uppercase;
  margin-bottom:9px;
}

.strategy-card-body {
  font-size:12px;
  line-height:1.85;
  color:var(--muted2);
}

/* ════════════════════
   ANIMATIONS
════════════════════ */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes spin { to { transform:rotate(360deg); } }

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--ink); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="crown">♛</div>
    <div class="logo-line">AI Quiz Trainer</div>
    <h1>早押し<em>最適化</em>トレーナー</h1>
    <p class="tagline">問題文を解析し、確定ポイントを可視化する</p>
    <div class="badge-free">API キー不要 &nbsp;·&nbsp; 完全無料 &nbsp;·&nbsp; Claude Sonnet 4.5</div>
  </header>

  <div class="panel input-panel">
    <div class="panel-label">問題文を入力</div>
    <textarea id="questionText" placeholder="例：「走れメロス」の中で、メロスが人質として王のもとに残した人物の名前は何でしょう？"></textarea>
    <div class="answer-row">
      <span class="answer-label">答え</span>
      <input type="text" class="answer-input" id="answerText" placeholder="セリヌンティウス">
    </div>
    <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">
      <span class="btn-text">⚡ 早押しポイントを解析する</span>
      <div class="spinner"></div>
    </button>
    <p class="hint-text">Ctrl + Enter でも解析</p>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-header">
        <span id="progressStep">待機中...</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
    </div>
  </div>

  <p class="limit-note" id="limitNote">
    ⚠️ 無料枠は1日数十〜数百回程度。制限に達したら時間をおいて再試行してください。
  </p>
  <div class="error-box" id="errorBox"></div>

  <div class="result-section" id="resultSection">

    <div class="difficulty-row" id="difficultyRow"></div>

    <div class="best-panel">
      <div class="best-panel-label">最適な押しポイント</div>
      <div class="best-phrase" id="bestPointText"></div>
      <div class="best-reason" id="bestPointReason"></div>
    </div>

    <div class="heatmap-panel">
      <div class="panel-label">問題文ヒートマップ（ホバーでヒント）</div>
      <div class="question-display" id="questionDisplay"></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--s5)"></div>今すぐ押せる</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--s4)"></div>ほぼ確定</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--s3)"></div>やや絞れる</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--s2)"></div>まだ早い</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--muted)"></div>情報なし</div>
      </div>
    </div>

    <div class="strategy-grid" id="strategyGrid"></div>

  </div>
</div>

<script>
async function analyze() {
  const question = document.getElementById('questionText').value.trim();
  const answer   = document.getElementById('answerText').value.trim();
  const btn      = document.getElementById('analyzeBtn');
  const errorBox = document.getElementById('errorBox');

  errorBox.classList.remove('visible');
  if (!question) { showError('問題文を入力してください。'); return; }

  btn.classList.add('loading');
  btn.disabled = true;
  document.getElementById('resultSection').classList.remove('visible');
  document.getElementById('limitNote').style.display = 'none';

  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressStep = document.getElementById('progressStep');
  const progressPct  = document.getElementById('progressPct');
  progressWrap.classList.add('visible');

  const steps = [
    { pct: 10, label: '問題文を解析中...' },
    { pct: 30, label: '確定ポイントを特定中...' },
    { pct: 55, label: 'ヒートマップを生成中...' },
    { pct: 75, label: '早押し戦略を構築中...' },
    { pct: 90, label: '結果を整形中...' },
  ];
  let stepIdx = 0;
  const progressTimer = setInterval(() => {
    if (stepIdx < steps.length) {
      const s = steps[stepIdx++];
      progressFill.style.width = s.pct + '%';
      progressStep.textContent = s.label;
      progressPct.textContent = s.pct + '%';
    }
  }, 900);

  const prompt = `あなたは競技クイズ（早押しクイズ）の超一流プレイヤーかつ解析の専門家です。

問題文: 「${question}」
答え（分析用・問題文には絶対に含めないこと）: 「${answer || '不明'}」

【絶対禁止】
- chunksの中に答えの文字列を含めてはいけない
- 問題文にない文字をchunksに追加してはいけない
- chunksを全て結合すると問題文と完全に一致しなければならない

【スコアの付け方：積極的に早めに高スコアをつける】
競技クイズの上級プレイヤーは「確信がなくても早めに押す」。
そのため、スコアは実際に確信が持てるより1段階早く（積極的に）付ける。
scoreは絶対に下がらない。一度上がったら以降は同じかそれ以上。

score基準（積極的判定）:
- 1: 答えと完全に無関係
- 2: 答えが連想できる程度（同ジャンルのキーワード出現）
- 3: 答えの候補が数個以内に絞れる（ここで勇気ある押しを狙う）
- 4: 答えがほぼ一択（確信80%以上）
- 5: 答えが完全に一意確定・これ以降ずっと5

【重要：スコアを早めにつける具体的ルール】
- 答えと同じカテゴリの固有名詞・専門用語が出たらscore=3（まだ候補が複数でも）
- 答えに直結する修飾語・限定語が出たらscore=4（「唯一の」「特に」「のみ」など）
- 答えを一意に特定できる情報が出たらscore=5（以降は全て5）
- 「何でしょう？」などの末尾疑問文もscore=5（確定後なので）

【1文字単位での分割ルール】
- 1文字〜3文字の細かい単位で分割する
- 句読点「、」「。」「？」「『』」も独立したchunkにする
- 1つのchunkに4文字以上入れない

【確定ポイントの例】
- 「宮沢賢治が」→ score=3（宮沢賢治の作品が候補に絞られる）
- 「生前刊行した」→ score=4（詩集に絞られてきた）
- 「唯一の詩集」→ score=5（春と修羅しかない）
- 「テイラー展開の中でも特に、」→ score=4（マクローリン展開が濃厚）
- 「x=0の周り」→ score=5（完全確定）

次のJSON形式だけで回答してください。説明文は一切不要です:

{
  "difficulty": "easy",
  "difficulty_reason": "難易度の理由（30文字以内）",
  "best_push_phrase": "score=5が最初に登場するchunkのtext",
  "best_push_reason": "なぜそこが確定ポイントか（120文字以内）",
  "chunks": [
    { "text": "1〜3文字", "score": 1, "tip": "score3以上のみ・20文字以内、それ以外は空文字" }
  ],
  "early_strategy": "この問題で早押しに勝つ具体的な戦略（120文字以内）",
  "trap_warning": "混同しやすい答え・カブりのリスク（100文字以内）"
}

difficultyは"easy"（有名・教養）"mid"（専門知識必要）"hard"（高難度・マニアック）のいずれか。`;

  try {
    const response = await puter.ai.chat(prompt, { model: 'claude-sonnet-4-5' });

    function extractText(r) {
      if (typeof r === 'string') return r;
      const candidates = [
        r?.text,
        r?.message?.content,
        r?.message?.content?.[0]?.text,
        r?.choices?.[0]?.message?.content,
        r?.content?.[0]?.text,
        r?.content,
      ];
      for (const c of candidates) {
        if (typeof c === 'string' && c.length > 0) return c;
        if (Array.isArray(c)) {
          const joined = c.map(b => b?.text || b?.content || '').join('');
          if (joined.length > 0) return joined;
        }
      }
      return JSON.stringify(r);
    }
    const rawText = extractText(response);

    const jsonMatch = rawText.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('AIの応答を解析できませんでした。再度お試しください。');

    const result = JSON.parse(jsonMatch[0]);

    if (result.chunks) {
      const joined = result.chunks.map(c => c.text).join('');
      if (joined !== question) {
        const scoreMap = {};
        let pos = 0;
        for (const chunk of result.chunks) {
          const idx = question.indexOf(chunk.text, pos);
          if (idx !== -1) {
            for (let i = idx; i < idx + chunk.text.length; i++) {
              scoreMap[i] = Math.max(scoreMap[i] || 1, chunk.score);
            }
            pos = idx + chunk.text.length;
          }
        }
        result.chunks = question.split('').map((char, i) => ({
          text: char, score: scoreMap[i] || 1, tip: ''
        }));
      }

      let maxScore = 1;
      result.chunks = result.chunks.map(chunk => {
        if (chunk.score > maxScore) maxScore = chunk.score;
        return { ...chunk, score: maxScore };
      });

      result.chunks = result.chunks.map(chunk => {
        if (chunk.score >= 2 && chunk.score < 5)
          return { ...chunk, score: Math.min(chunk.score + 1, 5) };
        return chunk;
      });

      const firstScore5 = result.chunks.find(c => c.score === 5);
      if (firstScore5) result.best_push_phrase = firstScore5.text;
    }

    clearInterval(progressTimer);
    progressFill.style.width = '100%';
    progressStep.textContent = '解析完了';
    progressPct.textContent = '100%';
    setTimeout(() => progressWrap.classList.remove('visible'), 700);
    renderResult(result);

  } catch (e) {
    const msg = e.message || String(e);
    if (msg.includes('login') || msg.includes('auth') || msg.includes('sign')) {
      showError('初回利用時はPuter.jsのログインが必要です。\nポップアップが表示されたらGoogleアカウントでサインインしてください。\nその後もう一度解析ボタンを押してください。');
    } else {
      showError('エラー: ' + msg);
    }
  } finally {
    clearInterval(progressTimer);
    progressWrap.classList.remove('visible');
    progressFill.style.width = '0%';
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function renderResult(result) {
  const diffMap = {
    easy: ['badge-easy', '初級'],
    mid:  ['badge-mid',  '中級'],
    hard: ['badge-hard', '上級']
  };
  const [cls, label] = diffMap[result.difficulty] || ['badge-mid', '中級'];
  document.getElementById('difficultyRow').innerHTML =
    `<span class="badge ${cls}">${label}</span><span class="difficulty-label">${result.difficulty_reason || ''}</span>`;

  document.getElementById('bestPointText').textContent = `「${result.best_push_phrase}」で押す`;
  document.getElementById('bestPointReason').textContent = result.best_push_reason || '';

  const display = document.getElementById('questionDisplay');
  display.innerHTML = '';
  (result.chunks || []).forEach(chunk => {
    const span = document.createElement('span');
    span.className = 'chunk';
    span.setAttribute('data-score', chunk.score || 1);
    span.textContent = chunk.text;
    if (chunk.tip && chunk.score >= 3) {
      const tip = document.createElement('div');
      tip.className = 'tooltip';
      tip.textContent = chunk.tip;
      span.appendChild(tip);
    }
    display.appendChild(span);
  });

  document.getElementById('strategyGrid').innerHTML = `
    <div class="strategy-card">
      <div class="strategy-card-title">⚡ 早押し戦略</div>
      <div class="strategy-card-body">${result.early_strategy || '-'}</div>
    </div>
    <div class="strategy-card">
      <div class="strategy-card-title">⚠️ 注意ポイント</div>
      <div class="strategy-card-body">${result.trap_warning || '-'}</div>
    </div>
  `;

  document.getElementById('resultSection').classList.add('visible');
  setTimeout(() => {
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.add('visible');
  if (msg.includes('quota') || msg.includes('rate') || msg.includes('limit') || msg.includes('429')) {
    document.getElementById('limitNote').style.display = 'block';
  }
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') analyze();
});
</script>
