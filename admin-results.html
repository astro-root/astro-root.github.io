<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>解析結果ログ — 管理画面</title>
<script src="https://js.puter.com/v2/"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #070a12;
  --bg2:   #0b0f1c;
  --bg3:   #111828;
  --c:     #00c8f0;
  --c2:    #0099bb;
  --c3:    #80e8ff;
  --green: #00e5a0;
  --amber: #f5a623;
  --rose:  #ff5577;
  --text:  #dde8f5;
  --sub:   #a8bdd4;
  --dim:   #6a7a99;
  --s5:    #00c8f0;
  --s4:    #00e5a0;
  --s3:    #f5a623;
  --s2:    #ff5577;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans JP', sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(0,200,240,0.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,200,240,0.028) 1px, transparent 1px);
  background-size:60px 60px;
  pointer-events:none; z-index:0;
}

.scanline {
  position:fixed; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent 0%, var(--c) 40%, var(--c3) 50%, var(--c) 60%, transparent 100%);
  opacity:0.2;
  animation:scan 10s linear infinite;
  pointer-events:none; z-index:10;
}
@keyframes scan { 0%{top:-1px;}100%{top:100vh;} }

.wrap {
  max-width:900px;
  margin:0 auto;
  padding:48px 24px 100px;
  position:relative; z-index:1;
}

/* ── header ── */
.hud-bar {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:28px; padding-bottom:14px;
  border-bottom:1px solid rgba(0,200,240,0.1);
}
.sys-id {
  font-family:'Share Tech Mono', monospace;
  font-size:10px; color:var(--c); letter-spacing:0.2em;
}
.sys-status {
  display:flex; align-items:center; gap:7px;
  font-family:'Share Tech Mono', monospace;
  font-size:9px; color:var(--green); letter-spacing:0.12em;
}
.pulse-dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--green); position:relative;
}
.pulse-dot::after {
  content:''; position:absolute; inset:-3px;
  border-radius:50%; border:1px solid var(--green);
  animation:ripple 2s ease infinite;
}
@keyframes ripple { 0%{opacity:.8;transform:scale(1);}100%{opacity:0;transform:scale(2.2);} }

h1 {
  font-family:'Rajdhani', sans-serif; font-weight:700;
  font-size:clamp(26px,5vw,44px); letter-spacing:0.04em;
  text-transform:uppercase; color:#fff; margin-bottom:6px;
}
h1 .hi { color:var(--c); }

.sub-title {
  font-size:12px; color:#b0c4d8; letter-spacing:0.04em; margin-bottom:32px;
}

/* ── toolbar ── */
.toolbar {
  display:flex; align-items:center; gap:10px; margin-bottom:20px; flex-wrap:wrap;
}

.btn-reload {
  padding:8px 20px;
  background:transparent; border:1px solid var(--c);
  color:var(--c); font-family:'Rajdhani', sans-serif;
  font-size:13px; font-weight:700; letter-spacing:0.16em;
  text-transform:uppercase; cursor:pointer;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
  transition:all 0.2s; position:relative; overflow:hidden;
}
.btn-reload-bg {
  position:absolute; inset:0; background:var(--c);
  transform:translateY(101%); transition:transform 0.22s cubic-bezier(0.4,0,0.2,1); z-index:0;
}
.btn-reload:hover .btn-reload-bg { transform:translateY(0); }
.btn-reload:hover { color:var(--bg); }
.btn-reload span { position:relative; z-index:1; }

.count-badge {
  font-family:'Share Tech Mono', monospace; font-size:9px;
  letter-spacing:0.14em; color:var(--sub);
}

.filter-wrap {
  margin-left:auto;
  display:flex; gap:8px; align-items:center;
}

.filter-input {
  background:rgba(0,200,240,0.03);
  border:1px solid rgba(0,200,240,0.12);
  color:var(--text); font-family:'Share Tech Mono', monospace;
  font-size:11px; padding:6px 12px; outline:none;
  letter-spacing:0.08em; width:200px;
  clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,0 100%);
  transition:border-color 0.2s;
}
.filter-input:focus { border-color:rgba(0,200,240,0.35); }
.filter-input::placeholder { color:var(--dim); }

/* ── loading/empty ── */
.state-msg {
  text-align:center; padding:60px 0;
  font-family:'Share Tech Mono', monospace;
  font-size:12px; color:var(--dim); letter-spacing:0.12em;
}

/* ── cards ── */
.card-list { display:flex; flex-direction:column; gap:10px; }

.card {
  background:var(--bg2);
  border:1px solid rgba(0,200,240,0.1);
  clip-path:polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,16px 100%,0 calc(100% - 16px));
  position:relative;
  transition:border-color 0.2s;
  overflow:hidden;
}
.card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,var(--c),rgba(0,200,240,0.25) 50%,transparent);
}
.card:hover { border-color:rgba(0,200,240,0.25); }

.card-header {
  display:flex; align-items:flex-start; gap:12px;
  padding:14px 18px 12px; cursor:pointer; user-select:none;
}

.card-meta {
  display:flex; flex-direction:column; gap:4px; flex:1; min-width:0;
}

.card-top {
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
}

.card-id {
  font-family:'Share Tech Mono', monospace; font-size:8px;
  color:var(--dim); letter-spacing:0.14em;
}

.card-time {
  font-family:'Share Tech Mono', monospace; font-size:9px;
  color:var(--sub); letter-spacing:0.1em;
}

.badge {
  font-family:'Share Tech Mono', monospace; font-size:8px;
  letter-spacing:0.14em; padding:2px 9px; text-transform:uppercase;
  clip-path:polygon(0 0,calc(100% - 4px) 0,100% 4px,100% 100%,4px 100%,0 calc(100% - 4px));
}
.badge-easy { background:rgba(0,200,240,0.1); color:var(--c); border:1px solid rgba(0,200,240,0.3); }
.badge-mid  { background:rgba(245,166,35,0.1); color:var(--amber); border:1px solid rgba(245,166,35,0.3); }
.badge-hard { background:rgba(255,85,119,0.1); color:var(--rose); border:1px solid rgba(255,85,119,0.3); }

.card-question {
  font-size:13px; color:var(--text); line-height:1.6;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}

.card-answer {
  font-family:'Share Tech Mono', monospace; font-size:10px;
  color:var(--c); opacity:0.7; margin-top:2px;
}

.card-chevron {
  color:var(--dim); font-family:'Share Tech Mono', monospace;
  font-size:12px; transition:transform 0.2s; flex-shrink:0; align-self:center;
}
.card.open .card-chevron { transform:rotate(90deg); }

.card-body {
  display:none; padding:0 18px 18px;
}
.card.open .card-body { display:block; }

/* detail rows */
.detail-section { margin-bottom:14px; }

.detail-label {
  font-family:'Share Tech Mono', monospace; font-size:8px;
  letter-spacing:0.22em; color:var(--c); text-transform:uppercase;
  margin-bottom:6px; opacity:0.75;
}

.detail-value {
  font-size:13px; color:#b8cde0; line-height:1.75;
  background:rgba(0,200,240,0.02); border:1px solid rgba(0,200,240,0.06);
  padding:10px 13px;
  clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,0 100%);
}

.push-point {
  font-family:'Rajdhani', sans-serif; font-size:20px; font-weight:700;
  color:var(--c); text-shadow:0 0 14px rgba(0,200,240,0.4);
}

.heatmap-inline {
  font-size:15px; line-height:2.8; word-break:break-all; letter-spacing:0.02em;
}
.heatmap-inline .chunk { display:inline; }
.heatmap-inline .chunk[data-score="5"] { color:var(--s5); font-weight:700; }
.heatmap-inline .chunk[data-score="4"] { color:var(--s4); }
.heatmap-inline .chunk[data-score="3"] { color:var(--s3); }
.heatmap-inline .chunk[data-score="2"] { color:var(--s2); opacity:0.9; }
.heatmap-inline .chunk[data-score="1"] { color:#506080; }

.strategy-inline {
  display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px;
}
@media(max-width:500px){ .strategy-inline { grid-template-columns:1fr; } }

.si-card {
  background:rgba(0,200,240,0.02); border:1px solid rgba(0,200,240,0.07);
  padding:12px 14px;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%);
}
.si-title {
  font-family:'Share Tech Mono', monospace; font-size:8px;
  letter-spacing:0.18em; color:var(--c); text-transform:uppercase;
  margin-bottom:6px; opacity:0.8;
}
.si-body { font-size:12px; color:#b0c8d8; line-height:1.75; }

.feedback-tag {
  display:inline-block;
  background:rgba(0,229,160,0.07); border:1px solid rgba(0,229,160,0.2);
  padding:6px 12px; font-size:13px; color:#a0e8cc; line-height:1.65;
  clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,0 100%);
  width:100%;
}
.no-feedback {
  font-family:'Share Tech Mono', monospace; font-size:10px; color:var(--dim);
  letter-spacing:0.1em;
}

.btn-delete {
  font-family:'Share Tech Mono', monospace; font-size:9px;
  letter-spacing:0.14em; color:var(--rose); background:transparent;
  border:1px solid rgba(255,85,119,0.2); padding:5px 12px; cursor:pointer;
  clip-path:polygon(0 0,calc(100% - 5px) 0,100% 5px,100% 100%,0 100%);
  transition:all 0.2s;
}
.btn-delete:hover { background:rgba(255,85,119,0.08); border-color:rgba(255,85,119,0.4); }

.divider {
  height:1px; background:rgba(0,200,240,0.06); margin:14px 0;
}

/* ── animations ── */
@keyframes bootUp {
  from { opacity:0; transform:translateY(8px); filter:blur(2px); }
  to   { opacity:1; transform:translateY(0); filter:blur(0); }
}

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:rgba(0,200,240,0.2); border-radius:4px; }
</style>
</head>
<body>
<div class="scanline"></div>
<div class="wrap">

  <div class="hud-bar">
    <div class="sys-id">ADMIN // ANALYSIS LOG VIEWER</div>
    <div class="sys-status"><div class="pulse-dot"></div>ONLINE</div>
  </div>

  <h1>解析結果<span class="hi">ログ</span></h1>
  <p class="sub-title">// 送信された早押し解析レポートの一覧</p>

  <div class="toolbar">
    <button class="btn-reload" onclick="loadAll()">
      <div class="btn-reload-bg"></div>
      <span>↺ RELOAD</span>
    </button>
    <span class="count-badge" id="countBadge">— RECORDS</span>
    <div class="filter-wrap">
      <input class="filter-input" id="filterInput" type="text"
             placeholder="FILTER..." oninput="applyFilter()">
    </div>
  </div>

  <div id="stateMsg" class="state-msg">LOADING...</div>
  <div class="card-list" id="cardList"></div>

</div>

<script>
let allSubmissions = [];

async function loadAll() {
  const msg  = document.getElementById('stateMsg');
  const list = document.getElementById('cardList');
  msg.textContent = 'LOADING...';
  msg.style.display = 'block';
  list.innerHTML = '';

  try {
    const raw = await puter.kv.get('quiz_sub_index');
    if (!raw) { msg.textContent = 'NO DATA FOUND'; return; }
    const ids = JSON.parse(raw);
    if (!ids.length) { msg.textContent = 'NO RECORDS YET'; return; }

    const fetched = await Promise.all(
      ids.map(id =>
        puter.kv.get('quiz_sub_' + id).then(r => r ? JSON.parse(r) : null).catch(() => null)
      )
    );
    allSubmissions = fetched.filter(Boolean).reverse();
    document.getElementById('countBadge').textContent = allSubmissions.length + ' RECORDS';
    msg.style.display = 'none';
    renderCards(allSubmissions);
  } catch(e) {
    msg.textContent = 'ERROR: ' + (e.message || e);
  }
}

function applyFilter() {
  const q = document.getElementById('filterInput').value.toLowerCase();
  if (!q) { renderCards(allSubmissions); return; }
  const filtered = allSubmissions.filter(s =>
    (s.question||'').toLowerCase().includes(q) ||
    (s.answer||'').toLowerCase().includes(q) ||
    (s.feedback||'').toLowerCase().includes(q)
  );
  renderCards(filtered);
  document.getElementById('countBadge').textContent = filtered.length + ' / ' + allSubmissions.length + ' RECORDS';
}

function renderCards(list) {
  const container = document.getElementById('cardList');
  container.innerHTML = '';
  const msg = document.getElementById('stateMsg');
  if (!list.length) { msg.textContent = 'NO MATCH'; msg.style.display = 'block'; return; }
  msg.style.display = 'none';

  list.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animation = `bootUp 0.3s ${i * 0.04}s ease both`;

    const r = s.result || {};
    const diffMap = { easy:['badge-easy','EASY'], mid:['badge-mid','MID'], hard:['badge-hard','HARD'] };
    const [cls, lbl] = diffMap[r.difficulty] || ['badge-mid','MID'];

    const dt = new Date(s.submittedAt);
    const timeStr = dt.toLocaleString('ja-JP', {
      year:'numeric', month:'2-digit', day:'2-digit',
      hour:'2-digit', minute:'2-digit'
    });

    card.innerHTML = `
      <div class="card-header" onclick="toggleCard(this.parentElement)">
        <div class="card-meta">
          <div class="card-top">
            <span class="card-id">ID:${s.id}</span>
            <span class="card-time">${timeStr}</span>
            <span class="badge ${cls}">${lbl}</span>
          </div>
          <div class="card-question">${escHtml(s.question || '')}</div>
          ${s.answer ? `<div class="card-answer">ANS › ${escHtml(s.answer)}</div>` : ''}
        </div>
        <div class="card-chevron">›</div>
      </div>

      <div class="card-body">

        <div class="detail-section">
          <div class="detail-label">OPTIMAL PUSH POINT</div>
          <div class="detail-value">
            <span class="push-point">「${escHtml(r.best_push_phrase || '—')}」</span>
            <div style="font-size:12px;color:#a0b8cc;margin-top:6px;line-height:1.7;">${escHtml(r.best_push_reason || '')}</div>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-label">HEATMAP</div>
          <div class="detail-value">
            <div class="heatmap-inline" id="hm_${s.id}"></div>
          </div>
        </div>

        <div class="detail-section">
          <div class="strategy-inline">
            <div class="si-card">
              <div class="si-title">// 早押し戦略</div>
              <div class="si-body">${escHtml(r.early_strategy || '—')}</div>
            </div>
            <div class="si-card">
              <div class="si-title">// 注意ポイント</div>
              <div class="si-body">${escHtml(r.trap_warning || '—')}</div>
            </div>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-label">FEEDBACK</div>
          ${s.feedback
            ? `<div class="feedback-tag">${escHtml(s.feedback)}</div>`
            : `<span class="no-feedback">// NO COMMENT</span>`}
        </div>

        <div class="divider"></div>
        <button class="btn-delete" onclick="deleteRecord('${s.id}', this)">✕ DELETE</button>

      </div>`;

    container.appendChild(card);
    renderHeatmap(s.id, r.chunks || []);
  });
}

function renderHeatmap(id, chunks) {
  const el = document.getElementById('hm_' + id);
  if (!el) return;
  el.innerHTML = '';
  chunks.forEach(chunk => {
    const span = document.createElement('span');
    span.className = 'chunk';
    span.setAttribute('data-score', chunk.score || 1);
    span.textContent = chunk.text;
    el.appendChild(span);
  });
}

function toggleCard(card) {
  card.classList.toggle('open');
}

async function deleteRecord(id, btn) {
  if (!confirm(`ID:${id} を削除しますか？`)) return;
  btn.disabled = true;
  try {
    await puter.kv.del('quiz_sub_' + id);
    const raw = await puter.kv.get('quiz_sub_index');
    let idx = raw ? JSON.parse(raw) : [];
    idx = idx.filter(x => x !== id);
    await puter.kv.set('quiz_sub_index', JSON.stringify(idx));
    allSubmissions = allSubmissions.filter(s => s.id !== id);
    document.getElementById('countBadge').textContent = allSubmissions.length + ' RECORDS';
    renderCards(allSubmissions);
  } catch(e) {
    alert('削除失敗: ' + e.message);
    btn.disabled = false;
  }
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

loadAll();
</script>
</body>
</html>
