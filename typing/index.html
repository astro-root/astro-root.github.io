<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元素タイピング | Periodic Typing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-grid"></div>

<!-- 常時ホームボタン -->
<button id="btn-home" onclick="goHome()">&#x2302; HOME</button>

<!-- サウンドトグル -->
<button id="sound-toggle" title="サウンドON/OFF" onclick="toggleSound()">🔊</button>

<!-- ============================================================
     LOADING
     ============================================================ -->
<div id="scr-loading">
  <div class="loading-logo">元素タイピング</div>
  <div class="loading-bar-wrap">
    <div class="loading-bar" id="loading-bar"></div>
  </div>
  <div class="loading-msg" id="loading-msg">LOADING ELEMENTS.CSV...</div>
</div>

<!-- ============================================================
     TITLE
     ============================================================ -->
<div id="scr-title" class="screen">
  <div class="title-eyebrow">CHEMISTRY TYPING GAME</div>
  <div class="title-logo">元素タイピング</div>
  <div class="title-sub">PERIODIC TYPING</div>
  <div class="title-meta">
    <span id="el-count-badge">118元素収録</span>
    <span>3モード</span>
    <span>4難易度</span>
  </div>
  <div class="title-btns">
    <button class="tbtn" onclick="openMode('timeattack')">
      <span class="tbtn-icon">&#x23F1;</span>
      <span class="tbtn-label">タイムアタック</span>
      <span class="tbtn-desc">60秒で高スコアを狙う</span>
    </button>
    <button class="tbtn" onclick="openMode('endless')">
      <span class="tbtn-icon">&#x267E;</span>
      <span class="tbtn-label">エンドレス</span>
      <span class="tbtn-desc">ライフ制、どこまで続けられるか</span>
    </button>
    <button class="tbtn" onclick="openMode('practice')">
      <span class="tbtn-icon">&#x1F4DA;</span>
      <span class="tbtn-label">学習モード</span>
      <span class="tbtn-desc">ペナルティなし、じっくり覚える</span>
    </button>
    <button class="tbtn" onclick="showHighScore()">
      <span class="tbtn-icon">&#x1F3C6;</span>
      <span class="tbtn-label">ハイスコア</span>
      <span class="tbtn-desc">過去のベストを確認</span>
    </button>
  </div>
</div>

<!-- ============================================================
     MODE SELECT
     ============================================================ -->
<div id="scr-mode" class="screen">
  <button class="btn-back" onclick="showScreen('title')">&#x2190; 戻る</button>
  <div class="mode-header">
    <h2 id="mode-title-txt">難易度を選択</h2>
    <p id="mode-subtitle-txt"></p>
  </div>
  <div class="diff-row">
    <button class="dbtn" data-d="1" onclick="selDiff(1)">初級</button>
    <button class="dbtn" data-d="2" onclick="selDiff(2)">中級</button>
    <button class="dbtn" data-d="3" onclick="selDiff(3)">上級</button>
    <button class="dbtn" data-d="0" onclick="selDiff(0)">ランダム</button>
  </div>
  <div class="diff-info" id="diff-info">難易度を選択してください</div>
  <button class="start-btn" onclick="startGame()">START</button>
</div>

<!-- ============================================================
     GAME
     ============================================================ -->
<div id="scr-game" class="screen">
  <div class="hud">
    <div class="hud-grp">
      <div class="hud-it">
        <span class="hud-lbl">SCORE</span>
        <span class="hud-val" id="h-score">0</span>
      </div>
      <div class="hud-it">
        <span class="hud-lbl">COMBO</span>
        <span class="combo-val c0" id="h-combo">x1</span>
      </div>
    </div>
    <div class="hud-grp">
      <div class="hud-it" id="timer-wrap">
        <span class="hud-lbl">TIME</span>
        <span class="hud-val timer" id="h-timer">60</span>
      </div>
    </div>
    <div class="hud-grp">
      <div class="lives" id="h-lives"></div>
      <div class="hud-it">
        <span class="hud-lbl">COUNT</span>
        <span class="hud-val" id="h-count">0</span>
      </div>
    </div>
  </div>

  <div class="prog-wrap">
    <div class="prog-bar" id="prog" style="width:0%"></div>
  </div>

  <div class="game-main">
    <div class="el-card" id="el-card">
      <div class="card-meta">
        <span class="card-no" id="c-no">No.--</span>
        <span class="card-type" id="c-type-badge">NAME</span>
      </div>
      <div class="q-content" id="q-content"></div>
      <div class="hints" id="hints"></div>
    </div>

    <div class="typing-area">
      <div class="romaji-guide" id="romaji-guide"></div>
      <div class="inp-wrap">
        <input type="text" class="typing-inp" id="typing-inp"
          autocomplete="off" autocorrect="off" autocapitalize="none"
          spellcheck="false" inputmode="latin" placeholder="">
        <div class="inp-overlay" id="inp-overlay"></div>
      </div>
      <!-- hint-kana を削除済み -->
      <div class="typing-hint">
        <span class="hint-keys">TAB: スキップ &nbsp; ESC: 終了</span>
      </div>
    </div>
  </div>
</div>

<!-- ============================================================
     RESULT
     ============================================================ -->
<div id="scr-result" class="screen">
  <div class="result-inner">
    <div class="result-title" id="r-title">RESULT</div>
    <div class="result-mode" id="r-mode"></div>
    <div class="result-score" id="r-score">0</div>

    <div id="r-hs-badge" class="hs-badge" style="display:none">
      <span class="hs-badge-lbl">HIGH SCORE</span>
      <span class="hs-badge-val" id="r-hs-val">0</span>
    </div>

    <div class="result-stats">
      <div class="stat-box">
        <span class="stat-lbl">CORRECT</span>
        <span class="stat-val" id="r-correct">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-lbl">MISSES</span>
        <span class="stat-val" id="r-miss">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-lbl">MAX COMBO</span>
        <span class="stat-val" id="r-combo">0</span>
      </div>
    </div>

    <div class="pt-section">
      <div class="pt-title">ELEMENT CHART -- 出題した元素の結果</div>
      <div class="pt-grid" id="pt-grid"></div>
      <div class="pt-legend">
        <div class="legend-item"><div class="legend-dot p"></div>完璧(ノーミス)</div>
        <div class="legend-item"><div class="legend-dot g"></div>正解(ミスあり)</div>
        <div class="legend-item"><div class="legend-dot s"></div>苦戦・スキップ</div>
        <div class="legend-item"><div class="legend-dot u"></div>未出題</div>
      </div>
    </div>

    <div class="result-actions">
      <button class="rbtn" onclick="goHome()">&#x2302; タイトルへ</button>
      <button class="rbtn" onclick="showHighScore()">&#x1F3C6; ハイスコア</button>
      <button class="rbtn tweet" onclick="tweetResult()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.736-8.847L1.254 2.25H8.08l4.259 5.63 5.905-5.63zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        結果をシェア
      </button>
      <button class="rbtn primary" onclick="restartGame()">もう一度</button>
    </div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
