<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元素タイピング | Periodic Typing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050b1a;
  --bg2: #0a1428;
  --bg3: #0f1e38;
  --panel: rgba(0,220,190,0.04);
  --border: rgba(0,220,190,0.2);
  --border2: rgba(0,220,190,0.08);
  --text: #c8e0f8;
  --text-dim: #3a5a7a;
  --text-mid: #6a9ab8;
  --accent: #00dcc0;
  --accent2: #00ffcc;
  --amber: #f59e0b;
  --error: #f43f5e;
  --success: #10b981;
  --gold: #fbbf24;
  --font-mono: 'Share Tech Mono', 'Courier New', monospace;
  --font-ja: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-ja);
  position:relative;
}
/* Scanlines */
body::after{
  content:'';
  position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px);
  pointer-events:none;z-index:9999;
}
/* Grid bg */
.bg-grid{
  position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,220,190,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,220,190,0.025) 1px,transparent 1px);
  background-size:48px 48px;
  pointer-events:none;z-index:0;
}
/* Screens */
.screen{display:none;position:fixed;inset:0;z-index:10;flex-direction:column}
.screen.active{display:flex}

/* ===== TITLE SCREEN ===== */
#scr-title{align-items:center;justify-content:center;gap:24px;text-align:center}
.title-eyebrow{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);letter-spacing:6px;text-transform:uppercase}
.title-logo{
  font-family:var(--font-mono);
  font-size:clamp(32px,6vw,64px);
  color:var(--accent);
  letter-spacing:6px;
  text-shadow:0 0 24px rgba(0,220,190,0.7),0 0 50px rgba(0,220,190,0.3);
  animation:glow 3s ease-in-out infinite;
}
@keyframes glow{
  0%,100%{text-shadow:0 0 24px rgba(0,220,190,0.7),0 0 50px rgba(0,220,190,0.3)}
  50%{text-shadow:0 0 36px rgba(0,220,190,1),0 0 70px rgba(0,220,190,0.5),0 0 120px rgba(0,220,190,0.15)}
}
.title-sub{font-family:var(--font-mono);font-size:13px;color:var(--text-mid);letter-spacing:4px}
.title-meta{display:flex;gap:20px;font-family:var(--font-mono);font-size:11px;color:var(--text-dim)}
.title-meta span::before{content:'[ ';color:var(--accent);opacity:.5}
.title-meta span::after{content:' ]';color:var(--accent);opacity:.5}
.title-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:min(480px,90vw)}
.tbtn{
  background:var(--panel);border:1px solid var(--border);
  color:var(--text);padding:18px 16px;
  cursor:pointer;transition:all .2s;text-align:left;
  font-family:var(--font-ja);
  position:relative;overflow:hidden;
}
.tbtn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,220,190,0) 0%,rgba(0,220,190,0.05) 100%);
  opacity:0;transition:opacity .2s;
}
.tbtn:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,220,190,0.15)}
.tbtn:hover::before{opacity:1}
.tbtn-icon{font-size:22px;display:block;margin-bottom:6px}
.tbtn-label{font-size:15px;font-weight:700;display:block;color:var(--accent)}
.tbtn-desc{font-size:11px;color:var(--text-dim);margin-top:3px;display:block}

/* ===== MODE SCREEN ===== */
#scr-mode{align-items:center;justify-content:center;gap:28px}
.mode-header{text-align:center}
.mode-header h2{font-family:var(--font-mono);font-size:12px;letter-spacing:5px;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px}
.mode-header p{font-size:13px;color:var(--text-mid)}
.diff-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.dbtn{
  padding:12px 24px;border:1px solid var(--border);
  background:transparent;color:var(--text-mid);
  font-family:var(--font-ja);font-size:14px;
  cursor:pointer;transition:all .2s;
}
.dbtn:hover,.dbtn.sel{background:rgba(0,220,190,0.08);border-color:var(--accent);color:var(--accent)}
.dbtn[data-d="1"].sel{border-color:var(--success);color:var(--success);background:rgba(16,185,129,0.08)}
.dbtn[data-d="2"].sel{border-color:var(--amber);color:var(--amber);background:rgba(245,158,11,0.08)}
.dbtn[data-d="3"].sel{border-color:var(--error);color:var(--error);background:rgba(244,63,94,0.08)}
.diff-info{
  background:var(--panel);border:1px solid var(--border2);
  padding:14px 20px;max-width:440px;width:90%;
  font-size:13px;color:var(--text-mid);line-height:1.7;text-align:center;
  min-height:60px;
}
.start-btn{
  padding:16px 56px;background:var(--accent);border:none;
  color:var(--bg);font-family:var(--font-ja);font-size:17px;font-weight:900;
  cursor:pointer;letter-spacing:3px;transition:all .2s;
}
.start-btn:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,220,190,0.35)}
.btn-back{
  position:fixed;top:16px;left:16px;
  background:transparent;border:1px solid var(--border);
  color:var(--text-dim);padding:8px 16px;
  font-family:var(--font-mono);font-size:11px;letter-spacing:2px;
  cursor:pointer;transition:all .2s;z-index:100;
}
.btn-back:hover{border-color:var(--accent);color:var(--accent)}

/* ===== GAME SCREEN ===== */
.hud{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;border-bottom:1px solid var(--border2);
  background:rgba(5,11,26,0.9);backdrop-filter:blur(8px);
  flex-shrink:0;gap:8px;
}
.hud-grp{display:flex;align-items:center;gap:16px}
.hud-it{text-align:center;min-width:60px}
.hud-lbl{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);letter-spacing:3px;text-transform:uppercase;display:block}
.hud-val{font-family:var(--font-mono);font-size:22px;font-weight:bold;color:var(--accent);line-height:1}
.hud-val.timer{color:var(--text);transition:color .3s}
.hud-val.timer.warn{color:var(--amber)}
.hud-val.timer.danger{color:var(--error);animation:pulse .5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.combo-wrap{}
.combo-val{
  font-family:var(--font-mono);font-size:24px;font-weight:bold;
  transition:color .3s;
}
.combo-val.c0{color:var(--text-mid)}
.combo-val.c1{color:var(--success)}
.combo-val.c2{color:var(--amber)}
.combo-val.c3{color:#f97316}
.combo-val.c4{color:var(--error)}
.combo-bump{animation:bump .15s ease-out}
@keyframes bump{0%{transform:scale(1.6)}100%{transform:scale(1)}}
.lives{display:flex;gap:4px;align-items:center}
.life{font-size:18px;transition:all .3s}
.life.lost{filter:grayscale(1);opacity:.25}
.prog-wrap{height:2px;background:rgba(255,255,255,0.04);flex-shrink:0}
.prog-bar{height:100%;background:var(--accent);transition:width .4s ease;box-shadow:0 0 8px rgba(0,220,190,0.6)}
/* Game main */
.game-main{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:16px;gap:20px;overflow:hidden;
}
/* Element card */
.el-card{
  background:var(--panel);
  border:1px solid var(--border);
  padding:20px 28px;width:100%;max-width:560px;
  position:relative;transition:border-color .2s;
}
.el-card.diff1{border-left:3px solid rgba(16,185,129,0.5)}
.el-card.diff2{border-left:3px solid rgba(245,158,11,0.5)}
.el-card.diff3{border-left:3px solid rgba(244,63,94,0.5)}
.el-card.shake{animation:shake .3s ease-out}
@keyframes shake{
  0%{transform:translateX(0)}20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}100%{transform:translateX(0)}
}
.el-card.flash{animation:flash .35s ease-out}
@keyframes flash{
  0%,100%{box-shadow:none}
  50%{box-shadow:0 0 32px rgba(16,185,129,0.4);border-color:var(--success)}
}
.card-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.card-no{font-family:var(--font-mono);font-size:11px;color:var(--text-dim)}
.card-type{
  font-family:var(--font-mono);font-size:9px;letter-spacing:3px;
  text-transform:uppercase;padding:3px 8px;border:1px solid;
}
.card-type.t-name{color:var(--success);border-color:rgba(16,185,129,0.3)}
.card-type.t-symbol{color:var(--amber);border-color:rgba(245,158,11,0.3)}
.card-type.t-trivia{color:#a78bfa;border-color:rgba(167,139,250,0.3)}
.q-content{text-align:center;min-height:70px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.q-symbol{font-family:var(--font-mono);font-size:56px;color:var(--accent);text-shadow:0 0 20px rgba(0,220,190,0.4);line-height:1}
.q-name{font-size:clamp(24px,4vw,36px);font-weight:900;color:var(--text)}
.q-trivia{font-size:16px;color:var(--text);line-height:1.6;max-width:420px}
.q-atno{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin-top:2px}
.hints{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--border2)}
.hint-pill{
  font-size:12px;padding:3px 10px;
  border:1px solid rgba(255,255,255,0.08);
  color:var(--text-dim);transition:all .3s;
}
.hint-pill.shown{color:var(--text-mid);border-color:var(--border)}
.score-possible{font-family:var(--font-mono);font-size:11px;color:var(--gold);opacity:.8}
/* Typing area */
.typing-area{width:100%;max-width:560px;display:flex;flex-direction:column;gap:10px}
.romaji-guide{
  font-family:var(--font-mono);font-size:clamp(24px,4vw,36px);
  text-align:center;letter-spacing:4px;min-height:44px;
  user-select:none;
}
.rt{color:var(--text-dim)}
.rc{color:var(--accent);text-shadow:0 0 12px rgba(0,220,190,.8);animation:cblink 1s steps(1) infinite}
.rr{color:var(--text)}
@keyframes cblink{0%,100%{opacity:1}50%{opacity:0}}
.romaji-guide.err .rc{color:var(--error);text-shadow:0 0 12px rgba(244,63,94,.8);animation:none}
.inp-wrap{position:relative}
.typing-inp{
  width:100%;background:rgba(255,255,255,.02);
  border:1px solid var(--border);
  color:transparent;caret-color:transparent;
  font-family:var(--font-mono);font-size:20px;
  padding:14px 20px;outline:none;text-align:center;
  letter-spacing:4px;
}
.typing-inp:focus{border-color:var(--accent);box-shadow:0 0 16px rgba(0,220,190,.1)}
.typing-inp.err{border-color:var(--error);box-shadow:0 0 16px rgba(244,63,94,.15)}
.inp-overlay{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;font-family:var(--font-mono);font-size:20px;letter-spacing:4px;color:var(--accent);
}
.typing-hint{display:flex;justify-content:space-between;align-items:center;padding:0 2px}
.hint-kana{font-size:16px;color:var(--text-dim);letter-spacing:3px}
.hint-keys{font-family:var(--font-mono);font-size:10px;color:var(--text-dim)}
/* Score popup */
.score-pop{
  position:fixed;font-family:var(--font-mono);font-size:22px;font-weight:bold;
  color:var(--success);pointer-events:none;z-index:500;
  animation:scoreup 0.9s ease-out forwards;
}
@keyframes scoreup{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-60px);opacity:0}}
.combo-burst{
  position:fixed;font-family:var(--font-mono);font-size:clamp(28px,5vw,48px);
  font-weight:bold;pointer-events:none;z-index:500;
  top:50%;left:50%;transform:translate(-50%,-50%);
  text-shadow:0 0 24px currentColor;
  animation:burst .7s ease-out forwards;
}
@keyframes burst{
  0%{transform:translate(-50%,-50%) scale(.3);opacity:1}
  60%{transform:translate(-50%,-50%) scale(1.2);opacity:1}
  100%{transform:translate(-50%,-50%) scale(1);opacity:0}
}

/* ===== RESULT SCREEN ===== */
#scr-result{align-items:center;justify-content:flex-start;gap:0;overflow-y:auto;padding:20px 16px}
.result-inner{width:100%;max-width:640px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:20px;padding-bottom:24px}
.result-title{font-family:var(--font-mono);font-size:clamp(24px,5vw,40px);color:var(--accent);letter-spacing:6px;text-align:center;text-shadow:0 0 20px rgba(0,220,190,.5)}
.result-mode{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);letter-spacing:3px;text-align:center}
.result-score{font-family:var(--font-mono);font-size:clamp(48px,8vw,80px);font-weight:bold;color:var(--gold);text-shadow:0 0 30px rgba(251,191,36,.4);text-align:center}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%}
.stat-box{background:var(--panel);border:1px solid var(--border2);padding:14px;text-align:center}
.stat-lbl{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;display:block}
.stat-val{font-family:var(--font-mono);font-size:26px;color:var(--text)}
.pt-section{width:100%}
.pt-title{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);letter-spacing:3px;margin-bottom:10px}
.pt-grid{
  display:grid;grid-template-columns:repeat(18,1fr);
  gap:2px;width:100%;
}
.pt-cell{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:clamp(5px,0.9vw,10px);
  border:1px solid transparent;transition:all .2s;cursor:default;
}
.pt-cell.unseen{background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.04);color:var(--text-dim);opacity:.5}
.pt-cell.perfect{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.4);color:var(--success)}
.pt-cell.good{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.35);color:var(--amber)}
.pt-cell.struggle{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.3);color:var(--error)}
.pt-cell.gap{background:transparent;border-color:transparent}
.pt-legend{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:10px;color:var(--text-dim)}
.legend-dot{width:10px;height:10px;border:1px solid}
.legend-dot.p{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.4)}
.legend-dot.g{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.35)}
.legend-dot.s{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.3)}
.legend-dot.u{background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.04)}
.result-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.rbtn{
  padding:14px 28px;border:1px solid var(--border);
  background:transparent;color:var(--text);
  font-family:var(--font-ja);font-size:14px;cursor:pointer;transition:all .2s;
}
.rbtn:hover{background:rgba(0,220,190,.08);border-color:var(--accent);color:var(--accent)}
.rbtn.primary{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:700}
.rbtn.primary:hover{background:var(--accent2)}

/* Practice overlay */
.practice-overlay{
  position:fixed;inset:0;background:rgba(5,11,26,.96);
  z-index:200;display:flex;align-items:center;justify-content:center;
  animation:fadein .2s ease;
}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.practice-card{
  background:var(--bg2);border:1px solid var(--border);
  padding:28px;max-width:440px;width:90%;text-align:center;
}
.pc-status{font-family:var(--font-mono);font-size:14px;margin-bottom:14px}
.pc-status.ok{color:var(--success)}
.pc-status.skip{color:var(--text-dim)}
.pc-atno{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);letter-spacing:2px}
.pc-sym{font-family:var(--font-mono);font-size:60px;color:var(--accent);text-shadow:0 0 20px rgba(0,220,190,.4);line-height:1;margin:6px 0}
.pc-ja{font-size:26px;font-weight:900;color:var(--text)}
.pc-en{font-family:var(--font-mono);font-size:12px;color:var(--text-dim);margin:4px 0}
.pc-hira{font-size:16px;color:var(--text-mid);letter-spacing:2px;margin:4px 0}
.pc-romaji{font-family:var(--font-mono);font-size:18px;color:var(--accent);letter-spacing:3px;margin:4px 0}
.pc-trivia{font-size:13px;color:var(--text-dim);line-height:1.7;padding:10px;background:rgba(255,255,255,.02);border:1px solid var(--border2);margin:10px 0}
.pc-next{
  padding:12px 36px;background:var(--accent);border:none;
  color:var(--bg);font-family:var(--font-ja);font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;
}
.pc-next:hover{background:var(--accent2)}

/* Highscore modal */
.hs-modal{
  position:fixed;inset:0;background:rgba(5,11,26,.97);
  z-index:300;display:flex;align-items:center;justify-content:center;
}
.hs-inner{
  background:var(--bg2);border:1px solid var(--border);
  padding:28px;max-width:420px;width:90%;
}
.hs-title{font-family:var(--font-mono);font-size:14px;color:var(--accent);letter-spacing:4px;margin-bottom:20px;text-align:center}
.hs-table{width:100%;border-collapse:collapse}
.hs-table th{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);letter-spacing:2px;text-align:left;padding-bottom:8px;border-bottom:1px solid var(--border2)}
.hs-table td{font-family:var(--font-mono);font-size:14px;padding:6px 0;color:var(--text-mid);border-bottom:1px solid var(--border2)}
.hs-table td:last-child{color:var(--gold);text-align:right}
.hs-close{margin-top:20px;display:block;width:100%;padding:12px;background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:var(--font-mono);font-size:12px;cursor:pointer;letter-spacing:2px;transition:all .2s}
.hs-close:hover{border-color:var(--accent);color:var(--accent)}

@media(max-width:600px){
  .hud{padding:8px 12px;gap:4px}
  .hud-val{font-size:18px}
  .hud-grp{gap:10px}
  .title-btns{grid-template-columns:1fr}
  .result-stats{grid-template-columns:repeat(3,1fr)}
  .pt-cell{font-size:5px}
}
</style>
</head>
<body>
<div class="bg-grid"></div>

<!-- TITLE -->
<div id="scr-title" class="screen active">
  <div class="title-eyebrow">CHEMISTRY TYPING GAME</div>
  <div class="title-logo">元素タイピング</div>
  <div class="title-sub">PERIODIC TYPING</div>
  <div class="title-meta">
    <span>全118元素収録</span>
    <span>3モード</span>
    <span>4難易度</span>
  </div>
  <div class="title-btns">
    <button class="tbtn" onclick="openMode('timeattack')">
      <span class="tbtn-icon">⏱</span>
      <span class="tbtn-label">タイムアタック</span>
      <span class="tbtn-desc">60秒で高スコアを狙う</span>
    </button>
    <button class="tbtn" onclick="openMode('endless')">
      <span class="tbtn-icon">♾</span>
      <span class="tbtn-label">エンドレス</span>
      <span class="tbtn-desc">ライフ制、どこまで続けられるか</span>
    </button>
    <button class="tbtn" onclick="openMode('practice')">
      <span class="tbtn-icon">📚</span>
      <span class="tbtn-label">学習モード</span>
      <span class="tbtn-desc">ペナルティなし、じっくり覚える</span>
    </button>
    <button class="tbtn" onclick="showHighScore()">
      <span class="tbtn-icon">🏆</span>
      <span class="tbtn-label">ハイスコア</span>
      <span class="tbtn-desc">過去のベストを確認</span>
    </button>
  </div>
</div>

// UTILITIES
// ============================================================
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function buildPool(diff){
  if(diff===0) return shuffle(ELEMENTS);
  if(diff===1) return shuffle(ELEMENTS.filter(e=>e.diff===1));
  if(diff===2) return shuffle(ELEMENTS.filter(e=>e.diff<=2));
  return shuffle(ELEMENTS); // diff===3
}
function comboClass(c){
  if(c>=20) return 'c4';
  if(c>=10) return 'c3';
  if(c>=5) return 'c2';
  if(c>=3) return 'c1';
  return 'c0';
}
function comboMult(c){
  if(c>=20) return 4;
  if(c>=10) return 3;
  if(c>=5) return 2;
  if(c>=3) return 1.5;
  return 1;
}
function pickQType(diff, elDiff){
  const r=Math.random();
  // Weights: [name, symbol, trivia]
  const w = {
    1:[.80,.15,.05], 2:[.50,.35,.15], 3:[.25,.40,.35], 0:[.40,.35,.25]
  }[diff] || [.80,.15,.05];
  // Adjust for element difficulty: hard elements favor name type for accessibility
  const adjName = w[0] + (elDiff===3 ? .15 : 0) - (elDiff===1 ? .1 : 0);
  const adjSym = w[1];
  const tot = adjName + adjSym + w[2];
  const rn = r * tot;
  if(rn < adjName) return 'name';
  if(rn < adjName + adjSym) return 'symbol';
  return 'trivia';
}

  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('scr-'+id).classList.add('active');

function startGame(){
  if(G.diff===-1){alert('難易度を選択してください');return;}

// ============================================================
// GAME INIT & LOOP
// ============================================================
function initGame(){
  clearInterval(G.timerID);
  G.score=0; G.combo=0; G.maxCombo=0;
  G.lives= G.mode==='endless'?5:0;
  G.count=0; G.totalMisses=0;
  G.timeLeft= G.mode==='timeattack'?60:0;
  G.pool=buildPool(G.diff); G.poolIdx=0;
  G.elResults={}; G.running=true; G.practicing=false;
  // HUD setup
  updateHUD();
  document.getElementById('timer-wrap').style.display = G.mode==='timeattack'?'':'none';
  renderLives();
  if(G.mode==='timeattack'){
    G.timerID=setInterval(tickTimer,1000);
  }
  nextQuestion();
  setTimeout(()=>document.getElementById('typing-inp').focus(),100);
}
function tickTimer(){
  if(!G.running) return;
  G.timeLeft--;
  const tv=document.getElementById('h-timer');
  tv.textContent=G.timeLeft;
  tv.className='hud-val timer';
  if(G.timeLeft<=10) tv.classList.add('danger');
  else if(G.timeLeft<=20) tv.classList.add('warn');
  if(G.timeLeft<=0) endGame();
}
function nextQuestion(){
  if(G.poolIdx>=G.pool.length){
    // Cycle pool
    G.pool=shuffle(G.pool); G.poolIdx=0;
  }
  const el=G.pool[G.poolIdx++];
  G.curEl=el;
  G.curQType=pickQType(G.diff,el.diff);
  G.targets=[el.romaji,...el.alts];
  G.validTargets=[...G.targets];
  G.typed=''; G.missesOnEl=0;
  // Init result tracking
  if(!G.elResults[el.no]) G.elResults[el.no]={correct:false,misses:0};
  renderQuestion();
  updateRomajiGuide();
  document.getElementById('typing-inp').value='';
  document.getElementById('typing-inp').focus();
}
function endGame(){
  G.running=false;
  clearInterval(G.timerID);
  showResult();
}

function renderQuestion(){
  const el=G.curEl, qt=G.curQType;
  const card=document.getElementById('el-card');
  card.className='el-card diff'+el.diff;
  document.getElementById('c-no').textContent='No.' + el.no + ' / ' + el.sym;
  const badge=document.getElementById('c-type-badge');
  badge.textContent=QTYPE_LABELS[qt];
  badge.className='card-type t-'+qt;
  const qc=document.getElementById('q-content');
  if(qt==='name'){
    qc.innerHTML=`<div class="q-name">${el.ja}</div><div class="q-atno">${el.en}</div>`;
  } else if(qt==='symbol'){
    qc.innerHTML=`<div class="q-symbol">${el.sym}</div><div class="q-atno">第${el.no}番元素</div>`;
  } else {
    qc.innerHTML=`<div class="q-trivia">${el.trivia}</div>`;
  }
  renderHints(0);
  // Hint kana (always shown for diff1; shown after misses for others)
  const showKana = G.diff===1 || G.mode==='practice';
  document.getElementById('hint-kana').textContent = showKana ? el.hira : '';
  // Score possible
  const scoreNow = Math.round(el.score * QTYPE_MULT[qt] * comboMult(G.combo));
}
function renderHints(misses){
  const el=G.curEl, qt=G.curQType;
  const h=document.getElementById('hints');
  const pills=[];
  // Always show difficulty badge
  const diffs=['','初級','中級','上級'];
  pills.push(`<span class="hint-pill shown">${diffs[el.diff]}</span>`);
  // Score hint
  const sm=Math.round(el.score*QTYPE_MULT[qt]*comboMult(G.combo));
  pills.push(`<span class="score-possible">+${sm}pt</span>`);
  // Conditional hints based on question type and misses
  if(qt==='symbol'){
    if(misses>=2) pills.push(`<span class="hint-pill shown">${el.ja}</span>`);
    else pills.push(`<span class="hint-pill">日本語名 (${misses>=1?'→あと1ミスで表示':'2ミスで表示'})</span>`);
    if(misses>=1 && G.diff!==1) document.getElementById('hint-kana').textContent=el.hira;
  } else if(qt==='trivia'){
    if(misses>=2) pills.push(`<span class="hint-pill shown">${el.sym} / ${el.ja}</span>`);
    else if(misses>=1) pills.push(`<span class="hint-pill shown">${el.sym}</span>`);
    else pills.push(`<span class="hint-pill">元素記号 (1ミスで表示)</span>`);
    if(misses>=2 && G.diff!==1) document.getElementById('hint-kana').textContent=el.hira;
  } else { // name
    if(misses>=3) pills.push(`<span class="hint-pill shown">${el.sym}</span>`);
    else if(misses>0) pills.push(`<span class="hint-pill shown">${el.hira}</span>`);
  }
  h.innerHTML=pills.join('');
}

function updateRomajiGuide(){
  const guide=G.validTargets[0]||G.targets[0];
  const typed=G.typed;
  const rem=guide.slice(typed.length);
  const cursor=rem[0]||'';
  const rest=rem.slice(1);
  document.getElementById('romaji-guide').innerHTML=
    `<span class="rt">${typed}</span><span class="rc">${cursor}</span><span class="rr">${rest}</span>`;
  document.getElementById('romaji-guide').classList.remove('err');
  // Overlay
  document.getElementById('inp-overlay').textContent=typed+(cursor?'_':'');
}
function processInput(c){
  if(!G.running||G.practicing) return;
  const newTyped=G.typed+c;
  const filtered=G.validTargets.filter(t=>t.startsWith(newTyped));
  if(filtered.length===0){
    // Wrong
    wrongInput();
  } else {
    G.typed=newTyped;
    G.validTargets=filtered;
    updateRomajiGuide();
    const complete=filtered.some(t=>t===newTyped);
    if(complete) correctAnswer();
  }
}
function wrongInput(){
  G.totalMisses++;
  G.missesOnEl++;
  if(G.elResults[G.curEl.no]) G.elResults[G.curEl.no].misses++;
  // Visual feedback
  const card=document.getElementById('el-card');
  const inp=document.getElementById('typing-inp');
  const guide=document.getElementById('romaji-guide');
  trigger(card,'shake',300);
  inp.classList.add('err');
  guide.classList.add('err');
  setTimeout(()=>{inp.classList.remove('err');guide.classList.remove('err');},250);
  // Update hints
  renderHints(G.missesOnEl);
  // Show kana after first miss in non-初級
  if(G.missesOnEl>=1 && G.diff!==1){
    document.getElementById('hint-kana').textContent=G.curEl.hira;
  }
  // Endless: too many misses = auto-skip with life loss
  if(G.mode==='endless' && G.missesOnEl>=7){
    loseLife();
    skipElement(false);
  }
}
function correctAnswer(){
  const el=G.curEl;
  G.combo++;
  if(G.combo>G.maxCombo) G.maxCombo=G.combo;
  if(G.elResults[el.no]) G.elResults[el.no].correct=true;
  const pts=Math.round(el.score*QTYPE_MULT[G.curQType]*comboMult(G.combo));
  G.score+=pts; G.count++;
  // Combo break on misses
  if(G.missesOnEl>3) G.combo=0;
  updateHUD();
  // Score popup
  spawnScorePopup(pts);
  // Combo burst
  if(G.combo>0 && G.combo%5===0) spawnComboBurst();
  // Flash card
  trigger(document.getElementById('el-card'),'flash',400);
  if(G.mode==='practice'){
    showPracticeCard(true);
  } else {
    setTimeout(nextQuestion, 120);
  }
}
function skipElement(userInitiated=true){
  if(G.mode==='endless' && userInitiated) loseLife();
  G.combo=0;
  updateHUD();
  if(G.mode==='practice'){
    showPracticeCard(false);
  } else {
    nextQuestion();
  }
}
function loseLife(){
  G.lives=Math.max(0,G.lives-1);
  renderLives();
  if(G.lives<=0) endGame();
}

// ============================================================
// HUD UPDATE
// ============================================================
function updateHUD(){
  document.getElementById('h-score').textContent=G.score.toLocaleString();
  const cv=document.getElementById('h-combo');
  cv.textContent=fmtCombo(G.combo);
  cv.className='combo-val '+comboClass(G.combo);
  trigger(cv,'combo-bump',150);
  document.getElementById('h-count').textContent=G.count;
  // Progress bar
  const poolSize=G.pool.length;
  document.getElementById('prog').style.width=(G.poolIdx/poolSize*100)+'%';
}
function renderLives(){
  const lv=document.getElementById('h-lives');
  if(G.mode!=='endless'){lv.innerHTML='';return;}
  lv.innerHTML='';
  for(let i=0;i<5;i++){
    const sp=document.createElement('span');
    sp.className='life'+(i>=G.lives?' lost':'');
    sp.textContent='❤';
    lv.appendChild(sp);
  }
}

// ============================================================
// VISUAL EFFECTS
// ============================================================
function spawnScorePopup(pts){
  const el=document.createElement('div');
  el.className='score-pop';
  el.textContent='+'+pts;
  const card=document.getElementById('el-card').getBoundingClientRect();
  el.style.left=(card.left+card.width/2-20)+'px';
  el.style.top=(card.top)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1000);
}
function spawnComboBurst(){
  const el=document.createElement('div');
  el.className='combo-burst';
  const cls=comboClass(G.combo);
  el.style.color=cls==='c4'?'var(--error)':cls==='c3'?'#f97316':cls==='c2'?'var(--amber)':'var(--success)';
  el.textContent=G.combo+'COMBO!';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),800);
}

// ============================================================
// PRACTICE MODE CARD
// ============================================================
function showPracticeCard(wasCorrect){
  G.practicing=true;
  const el=G.curEl;
  const ov=document.createElement('div');
  ov.className='practice-overlay';
  ov.innerHTML=`
    <div class="practice-card">
      <div class="pc-status ${wasCorrect?'ok':'skip'}">${wasCorrect?'✓ 正解！':'→ スキップ'}</div>
      <div class="pc-atno">No.${el.no} — ${el.en}</div>
      <div class="pc-sym">${el.sym}</div>
      <div class="pc-ja">${el.ja}</div>
      <div class="pc-hira">${el.hira}</div>
      <div class="pc-romaji">${el.romaji}</div>
      <div class="pc-trivia">${el.trivia}</div>
      <button class="pc-next" onclick="closePracticeCard()">次の問題へ →</button>
    </div>`;
  document.body.appendChild(ov);
  ov.id='practice-ov';
}
function closePracticeCard(){
  const ov=document.getElementById('practice-ov');
  if(ov) ov.remove();
  G.practicing=false;
  nextQuestion();
  document.getElementById('typing-inp').focus();
}

// ============================================================
// RESULT SCREEN
// ============================================================
function showResult(){
  showScreen('result');
  const mLabel = MODE_INFO[G.mode].label + ' / ' + DIFF_INFO[G.diff].label;
  document.getElementById('r-title').textContent =
    G.mode==='timeattack'?'TIME UP':G.mode==='endless'?'GAME OVER':'RESULT';
  document.getElementById('r-mode').textContent=mLabel;
  animateCount('r-score',0,G.score,1200);
  document.getElementById('r-correct').textContent=G.count;
  document.getElementById('r-miss').textContent=G.totalMisses;
  document.getElementById('r-combo').textContent=G.maxCombo;
  buildPTGrid();
  saveHighScore();
}
function animateCount(id,from,to,dur){
  const el=document.getElementById(id);
  const start=performance.now();
  function step(now){
    const t=Math.min((now-start)/dur,1);
    const ease=t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    el.textContent=Math.round(from+(to-from)*ease).toLocaleString();
    if(t<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function buildPTGrid(){
  const grid=document.getElementById('pt-grid');
  grid.innerHTML='';
  // Map no -> element
  const noMap={};
  ELEMENTS.forEach(e=>noMap[e.no]=e);
  PT_GRID.forEach(([no,grp])=>{
    const cell=document.createElement('div');
    if(no===0||no===-1||no===-2){
      cell.className='pt-cell gap';
      cell.textContent= no===-1?'La…':no===-2?'Ac…':'';
      if(no!==0) cell.style.color='var(--text-dim)';
    } else {
      const r=G.elResults[no];
      const sym=noMap[no]?noMap[no].sym:'?';
      cell.textContent=sym;
      if(!r) cell.className='pt-cell unseen';
      else if(r.correct && r.misses===0) cell.className='pt-cell perfect';
      else if(r.correct) cell.className='pt-cell good';
      else cell.className='pt-cell struggle';
      cell.title=noMap[no]?`${noMap[no].ja} (${sym})`:'';
    }
    grid.appendChild(cell);
  });
}

// ============================================================
// HIGH SCORE
// ============================================================
function getHSKey(){ return `hs_${G.mode}_${G.diff}`; }
function saveHighScore(){
  const key=getHSKey();
  const saved=JSON.parse(localStorage.getItem(key)||'[]');
  saved.push({score:G.score,correct:G.count,date:new Date().toLocaleDateString('ja-JP')});
  saved.sort((a,b)=>b.score-a.score);
  localStorage.setItem(key,JSON.stringify(saved.slice(0,5)));
}
function showHighScore(){
  const modal=document.createElement('div');
  modal.className='hs-modal';
  const modes=['timeattack','endless','practice'];
  const diffs=[1,2,3,0];
  const mLabel={timeattack:'TA',endless:'END',practice:'PRG'};
  const dLabel={1:'初級',2:'中級',3:'上級',0:'RND'};
  let rows='';
  for(const m of modes){
    for(const d of diffs){
      const key=`hs_${m}_${d}`;
      const saved=JSON.parse(localStorage.getItem(key)||'[]');
      if(saved.length>0){
        const best=saved[0];
        rows+=`<tr><td>${mLabel[m]}-${dLabel[d]}</td><td>${best.date}</td><td>${best.score.toLocaleString()}</td></tr>`;
      }
    }
  }
  if(!rows) rows='<tr><td colspan="3" style="color:var(--text-dim);text-align:center">データなし</td></tr>';
  modal.innerHTML=`
    <div class="hs-inner">
      <div class="hs-title">HALL OF FAME</div>
      <table class="hs-table">
        <thead><tr><th>モード</th><th>日付</th><th>スコア</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <button class="hs-close" onclick="this.closest('.hs-modal').remove()">閉じる</button>
    </div>`;
  document.body.appendChild(modal);
}

// ============================================================
// EVENT LISTENERS
// ============================================================
document.addEventListener('keydown', e=>{
  if(!G.running || G.practicing) return;
  if(e.key==='Tab'){e.preventDefault();skipElement(true);return;}
  if(e.key==='Escape'){e.preventDefault();endGame();return;}
  if(e.key.length===1 && /^[a-z\-]$/i.test(e.key) && !e.ctrlKey && !e.metaKey && !e.altKey){
    e.preventDefault();
    processInput(e.key.toLowerCase());
    // Sync visible input
    const inp=document.getElementById('typing-inp');
    inp.value=G.typed;
  }
});

// Mobile: input event fallback
document.getElementById('typing-inp').addEventListener('input', e=>{
  if(!G.running || G.practicing) return;
  const val=e.target.value.toLowerCase().replace(/[^a-z\-]/g,'');
  // Process only new characters
  if(val.length>G.typed.length){
    const newChar=val.slice(G.typed.length);
    for(const c of newChar) processInput(c);
  }
  e.target.value=G.typed;
});
// Prevent form submit on mobile
document.getElementById('typing-inp').addEventListener('keydown', e=>{
  if(e.key==='Enter') e.preventDefault();
});
// Keep input focused
document.getElementById('scr-game').addEventListener('click', ()=>{
  if(G.running) document.getElementById('typing-inp').focus();
});

console.log('元素タイピング loaded. 全'+ELEMENTS.length+'元素収録。');
